let _budgetTimer=null;

async function updateBudgetRange(catId, field, value) {
  const v=Number(value)||0;
  // Update state
  if(field==='min') state.budgetCategories=state.budgetCategories.map(c=>c.id===catId?{...c,presupuesto_min:v,presupuesto:v}:c);
  else state.budgetCategories=state.budgetCategories.map(c=>c.id===catId?{...c,presupuesto_max:v}:c);
  
  // Real-time DOM update
  updateFijoRowDisplay(catId);
  updateFijoTotals();
  
  // Debounced DB save
  clearTimeout(_budgetTimer);
  _budgetTimer=setTimeout(async()=>{
    const updates=field==='min'?{presupuesto_min:v,presupuesto:v}:{presupuesto_max:v};
    await db.from('budget_categories').update(updates).eq('id',catId);
  },600);
}

function updateFijoRowDisplay(catId) {
  const cat=state.budgetCategories.find(c=>c.id===catId);
  if(!cat) return;
  const cm=curMonth();
  const mtx=state.transactions.filter(t=>t.fecha?.startsWith(cm)&&t.tipo==='gasto');
  const spent=mtx.filter(t=>t.categoria===catId).reduce((s,t)=>s+Number(t.monto),0);
  const bMax=Number(cat.presupuesto_max)||Number(cat.presupuesto)||0;
  const bMin=Number(cat.presupuesto_min)||0;
  const budgetRef=bMax||bMin;
  const rem=budgetRef-spent;
  const p=budgetRef>0?pct(spent,budgetRef):0;
  const hasRange=bMin>0&&bMax>0&&bMin!==bMax;
  const st=p>100?'danger':(hasRange&&spent>bMin?'warning':p>85?'warning':'success');
  
  const row=document.querySelector(`tr[data-cat="${catId}"]`);
  if(!row) return;
  const tdSpent=row.querySelector('.td-spent');
  const tdRem=row.querySelector('.td-rem');
  const tdBadge=row.querySelector('.td-badge');
  if(tdRem) tdRem.innerHTML=`<span class="mono" style="color:${rem>=0?'var(--success)':'var(--danger)'}">${money(rem)}</span>`;
  if(tdBadge) tdBadge.innerHTML=budgetRef>0?`<span class="badge badge-${st}">${p>100?'+'+Math.round(p-100)+'%':Math.round(p)+'%'}</span>`:'';
  const bar=row.querySelector('.progress-fill');
  if(bar){bar.style.width=clamp(p,0,100)+'%';bar.style.background=`var(--${st})`;}
}

function updateFijoTotals() {
  const fijos=state.budgetCategories.filter(c=>(c.tipo_gasto||'fijo')!=='periodico');
  const cm=curMonth();
  const mtx=state.transactions.filter(t=>t.fecha?.startsWith(cm)&&t.tipo==='gasto');
  const totalP=fijos.reduce((s,c)=>s+(Number(c.presupuesto_max)||Number(c.presupuesto)||0),0);
  const totalG=fijos.reduce((s,c)=>s+mtx.filter(t=>t.categoria===c.id).reduce((sum,t)=>sum+Number(t.monto),0),0);
  
  const statCards=$$('.stat-card .stat-value');
  if(statCards.length>=3) {
    statCards[0].textContent=money(totalP);
    statCards[1].textContent=money(totalG);
    statCards[2].textContent=money(totalP-totalG);
    statCards[2].className='stat-value '+((totalP-totalG>=0)?'positive':'negative');
  }
}

      <div class="form-group"><label class="form-label">Nombre a Mostrar</label><input class="form-input" id="ecDisplay" value="${cc.nombre_display||''}"></div>
      <div class="form-group"><label class="form-label">Tipo</label><select class="form-select" id="ecTipo"><option value="credito" ${isCredit?'selected':''}>💳 Crédito</option><option value="debito" ${!isCredit?'selected':''}>🏧 Débito</option></select></div>
      <div class="form-group"><label class="form-label">Color</label><div class="flex gap-2 flex-wrap" style="margin-bottom:6px">${colorPicker}</div><input type="hidden" id="ecColor" value="${curColor}"><div id="ecColorPrev" style="width:100%;height:8px;border-radius:4px;background:${curColor}"></div></div>
      <div class="grid-2" style="gap:12px">
        <div class="form-group"><label class="form-label">Saldo Actual</label><input class="form-input" type="number" id="ecSaldo" value="${cc.saldo_actual}"></div>
        ${isCredit?`
        <div class="form-group"><label class="form-label">Límite Aprobado</label><input class="form-input" type="number" id="ecLimite" value="${cc.monto_aprobado}"></div>
        <div class="form-group"><label class="form-label">Monto Sobregiro</label><input class="form-input" type="number" id="ecSobregiro" value="${cc.monto_sobregiro}"></div>
        <div class="form-group"><label class="form-label">Día de Corte</label><input class="form-input" type="number" id="ecCorte" value="${cc.fecha_corte}" min="1" max="31"></div>
        <div class="form-group"><label class="form-label">Días Límite Pago</label><input class="form-input" type="number" id="ecDiasPago" value="${cc.dias_limite_pago}"></div>
        `:`
        <div class="form-group"><label class="form-label">Vencimiento (MM/AAAA)</label><div class="flex gap-2"><select class="form-select" id="ecVencMes" style="width:100px">${[...Array(12)].map((_,i)=>{const m=String(i+1).padStart(2,'0');const sel=cc.fecha_vencimiento&&cc.fecha_vencimiento.substring(5,7)===m?'selected':'';return '<option value="'+m+'" '+sel+'>'+m+'</option>';}).join('')}</select><input class="form-input" type="number" id="ecVencAnio" value="${cc.fecha_vencimiento?cc.fecha_vencimiento.substring(0,4):''}" placeholder="2028" style="width:100px"></div></div>
        `}
      </div>
      <div class="flex gap-2" style="justify-content:flex-end;margin-top:20px">
        <button class="btn btn-ghost" onclick="$('#editCardModal').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveEditCard('${cc.id}',${isCredit})">💾 Guardar</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

async function saveEditCard(id, isCredit) {
  const data={
    banco:$('#ecBanco').value.trim(),
    nombre_display:$('#ecDisplay').value.trim(),
    tipo_tarjeta:$('#ecTipo').value,
    saldo_actual:Number($('#ecSaldo').value)||0,
    color:$('#ecColor').value||'#2d5a27',
  };
  if(isCredit) {
    data.monto_aprobado=Number($('#ecLimite').value)||0;
    data.monto_sobregiro=Number($('#ecSobregiro').value)||0;
    data.fecha_corte=Number($('#ecCorte').value)||1;
    data.dias_limite_pago=Number($('#ecDiasPago').value)||25;
  } else {
    const mes=$('#ecVencMes')?.value;
    const anio=$('#ecVencAnio')?.value;
    data.fecha_vencimiento=(mes&&anio)?`${anio}-${mes}-01`:null;
  }
  await db.from('credit_cards').update(data).eq('id',id);
  $('#editCardModal').remove();
  await loadAll(); render();
}

async function toggleTheme() {
  state.theme=state.theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',state.theme);
  await db.from('settings').upsert({key:'theme',value:state.theme});
  render();
}

// ============================================================
// EVENT BINDING
// ============================================================
function bindEvents() {
  $$('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>{state.section=el.dataset.nav;render();});
  });
  const themeBtn=$('#themeToggle');
  if(themeBtn) themeBtn.addEventListener('click',toggleTheme);
}

// ============================================================
// INIT
// ============================================================
// ============================================================
// AUTH / LOGIN
// ============================================================
function renderLogin(error='') {
  const app=$('#app');
  app.className='';
  app.innerHTML=`
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-primary);padding:20px">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:var(--shadow-md)">
        <div style="text-align:center;margin-bottom:28px">
          <div style="font-size:48px;margin-bottom:8px">💰</div>
          <h1 style="font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px">FinanzasRD</h1>
          <p style="font-size:13px;color:var(--text-muted)">Ingresa para acceder a tus finanzas</p>
        </div>
        ${error?`<div style="background:var(--danger-light);color:var(--danger);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;border:1px solid var(--danger)">❌ ${error}</div>`:''}
        <div class="form-group">
          <label class="form-label">Usuario</label>
          <input class="form-input" id="loginUser" placeholder="aifotos o rosaliathen" autocomplete="username" style="font-size:15px">
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" style="font-size:15px">
        </div>
        <button class="btn btn-primary" onclick="doLogin()" style="width:100%;justify-content:center;padding:12px;font-size:15px;margin-top:8px">Entrar</button>
      </div>
    </div>`;
  // Enter key support
  setTimeout(()=>{
    const passInput=$('#loginPass');
    const userInput=$('#loginUser');
    if(passInput) passInput.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    if(userInput) userInput.addEventListener('keydown',e=>{if(e.key==='Enter')$('#loginPass').focus();});
    if(userInput) userInput.focus();
  },100);
}

async function doLogin() {
  const user=$('#loginUser').value.trim().toLowerCase();
  const pass=$('#loginPass').value;
  if(!user||!pass) return renderLogin('Ingresa usuario y contraseña');
  
  const email=user+'@finanzasrd.app';
  const {data,error}=await db.auth.signInWithPassword({email,password:pass});
  if(error) return renderLogin('Usuario o contraseña incorrectos');
  
  state.user=data.user;
  await loadAll();
  render();
}

async function doLogout() {
  await db.auth.signOut();
  state.user=null;
  renderLogin();
}

async function init() {
  try {
    // Check if already logged in
    const {data:{session}}=await db.auth.getSession();
    if(session&&session.user) {
      state.user=session.user;
      await loadAll();
      render();
    } else {
      renderLogin();
    }
  } catch(e) {
    console.error('Error:',e);
    renderLogin('Error conectando con el servidor');
  }
}

init();
</script>
</body>
</html>
