}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font-sans); background:var(--bg-primary); color:var(--text-primary); min-height:100vh; }
.app { display:flex; min-height:100vh; }
/* SIDEBAR */
.sidebar { width:var(--nav-width); background:var(--bg-secondary); border-right:1px solid var(--border); padding:24px 0; position:fixed; top:0; left:0; height:100vh; overflow-y:auto; z-index:100; display:flex; flex-direction:column; }
.sidebar-logo { padding:0 20px 24px; border-bottom:1px solid var(--border); margin-bottom:16px; }
.sidebar-logo h1 { font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--accent); }
.sidebar-logo span { font-size:11px; color:var(--text-muted); display:block; margin-top:2px; }
.nav-section { padding:0 12px; margin-bottom:8px; }
.nav-section-title { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-muted); padding:8px 8px 4px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius-sm); cursor:pointer; font-size:13.5px; font-weight:450; color:var(--text-secondary); transition:var(--transition); user-select:none; }
.nav-item:hover { background:var(--bg-tertiary); color:var(--text-primary); }
.nav-item.active { background:var(--accent-light); color:var(--accent); font-weight:600; }
.nav-icon { font-size:18px; width:24px; text-align:center; }
.sidebar-footer { margin-top:auto; padding:16px 12px 0; border-top:1px solid var(--border); }
/* MAIN */
.main { margin-left:var(--nav-width); flex:1; padding:32px 40px; max-width:1200px; }
.page-header { margin-bottom:28px; }
.page-header h2 { font-size:24px; font-weight:700; letter-spacing:-0.5px; }
.page-header p { font-size:14px; color:var(--text-secondary); margin-top:4px; }
/* CARDS */
.card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); }
.card-title { font-size:13px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:12px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.grid-4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:16px; }
/* STAT */
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow); }
.stat-label { font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); margin-bottom:8px; }
.stat-value { font-family:var(--font-mono); font-size:22px; font-weight:700; }
.stat-value.positive { color:var(--success); }
.stat-value.negative { color:var(--danger); }
.stat-value.warning { color:var(--warning); }
.stat-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }
/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius-sm); font-family:var(--font-sans); font-size:13px; font-weight:600; border:none; cursor:pointer; transition:var(--transition); }
.btn-primary { background:var(--accent); color:white; }
.btn-primary:hover { background:var(--accent-hover); }
.btn-danger { background:var(--danger); color:white; }
.btn-ghost { background:transparent; color:var(--text-secondary); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--bg-tertiary); color:var(--text-primary); }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-icon { width:28px; height:28px; padding:0; display:inline-flex; align-items:center; justify-content:center; border-radius:var(--radius-sm); background:var(--bg-tertiary); border:1px solid var(--border); cursor:pointer; font-size:12px; transition:var(--transition); color:var(--text-secondary); }
.btn-icon:hover { background:var(--accent-light); color:var(--accent); }
/* FORMS */
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
.form-input,.form-select { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:var(--font-sans); font-size:14px; color:var(--text-primary); background:var(--bg-secondary); transition:var(--transition); outline:none; }
.form-input:focus,.form-select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
/* TABLE */
table { width:100%; border-collapse:collapse; }
th { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); }
td { padding:12px; border-bottom:1px solid var(--border); font-size:13.5px; }
tr:hover td { background:var(--bg-tertiary); }
.table-container { overflow-x:auto; }
/* PROGRESS */
.progress-bar { width:100%; height:8px; background:var(--bg-tertiary); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
/* BADGE */
.badge { display:inline-flex; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-success { background:var(--success-light); color:var(--success); }
.badge-danger { background:var(--danger-light); color:var(--danger); }
.badge-warning { background:var(--warning-light); color:var(--warning); }
.badge-neutral { background:var(--bg-tertiary); color:var(--text-secondary); }
/* ALERT */
.alert { padding:12px 16px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.alert-warning { background:var(--warning-light); color:#856404; border:1px solid #ffc107; }
.alert-danger { background:var(--danger-light); color:var(--danger); border:1px solid var(--danger); }
/* TABS */
.tabs { display:flex; gap:2px; background:var(--bg-tertiary); padding:3px; border-radius:var(--radius-sm); margin-bottom:20px; width:fit-content; }
.tab { padding:7px 16px; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; color:var(--text-secondary); transition:var(--transition); border:none; background:transparent; font-family:var(--font-sans); }
.tab.active { background:var(--bg-card); color:var(--text-primary); font-weight:600; box-shadow:var(--shadow); }
/* TOGGLE */
.toggle { position:relative; width:44px; height:24px; background:var(--border); border-radius:12px; cursor:pointer; transition:var(--transition); }
.toggle.on { background:var(--accent); }
.toggle::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:white; transition:var(--transition); }
.toggle.on::after { left:22px; }
/* CC VISUAL */
.cc-visual { background:linear-gradient(135deg,var(--accent),#1a3d1a); border-radius:var(--radius); padding:20px; color:white; position:relative; overflow:hidden; min-height:140px; }
.cc-visual.popular { background:linear-gradient(135deg,#1a3a6b,#0a1f3b); }
.cc-visual::after { content:''; position:absolute; top:-30%; right:-10%; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.08); }
/* AMORT TABLE */
.amort-table { max-height:300px; overflow-y:auto; }
.amort-table table { font-size:12px; }
.amort-table td,.amort-table th { padding:6px 8px; }
/* CHART */
.chart-bars { display:flex; align-items:flex-end; gap:8px; height:150px; padding-top:10px; }
.chart-col { flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; }
.chart-bar { width:70%; max-width:30px; border-radius:4px 4px 0 0; transition:height 0.5s ease; min-height:2px; }
.chart-label { font-size:10px; color:var(--text-muted); margin-top:6px; }
.chart-val { font-size:10px; font-family:var(--font-mono); color:var(--text-secondary); margin-bottom:4px; }
/* UTILITY */
.flex-between { display:flex; align-items:center; justify-content:space-between; }
.flex { display:flex; }
.gap-2 { gap:8px; }
.gap-4 { gap:16px; }
.flex-wrap { flex-wrap:wrap; }
.mb-4 { margin-bottom:16px; }
.mb-6 { margin-bottom:24px; }
.mt-4 { margin-top:16px; }
.mono { font-family:var(--font-mono); }
.fw-700 { font-weight:700; }
.text-right { text-align:right; }
.empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); }
.empty-icon { font-size:48px; margin-bottom:12px; }
.loading { display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:12px; }
.hidden { display:none !important; }
/* MOBILE */
.mobile-nav { display:none; }
@media(max-width:900px) {
  .sidebar { display:none; }
  .main { margin-left:0; padding:20px; padding-bottom:80px; }
  .grid-2,.grid-3,.grid-4 { grid-template-columns:1fr; }
  .mobile-nav { display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--bg-secondary); border-top:1px solid var(--border); z-index:100; padding:8px 4px; overflow-x:auto; -webkit-overflow-scrolling:touch; gap:2px; }
  .mobile-nav::-webkit-scrollbar { display:none; }
  .mobile-nav button { display:flex; flex-direction:column; align-items:center; font-size:9px; color:var(--text-muted); cursor:pointer; padding:4px 6px; border-radius:8px; background:none; border:none; font-family:var(--font-sans); min-width:52px; flex-shrink:0; }
  .mobile-nav button.active { color:var(--accent); }
  .mobile-nav button span { font-size:20px; }
}

<script>
// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPABASE_URL = 'https://pwpxvapwyfpepcntvzon.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cHh2YXB3eWZwZXBjbnR2em9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjAxMTgsImV4cCI6MjA4OTg5NjExOH0.JtiQaEOnAiFmPYAqiJRqGxT-npmbHk_kCD2FirXVMS4';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let state = {
  section: 'dashboard',
  theme: 'light',
  transactions: [],
  creditCards: [],
  loans: [],
  loanPayments: [],
  budgetCategories: [],
  variableIncome: [],
  savingsDeposits: [],
  ingresos: [],
  plantillas: [],
  user: null,
};

const MONTHS_ES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MONTHS_FULL = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// ============================================================
// HELPERS
// ============================================================
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }
function money(n) { return 'RD$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fdate(d) { if(!d) return ''; const dt=new Date(d+'T00:00:00'); return dt.getDate()+' '+MONTHS_ES[dt.getMonth()]+' '+dt.getFullYear(); }
function curMonth() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function monthLabel(ym) { const[y,m]=ym.split('-'); return MONTHS_FULL[parseInt(m)-1]+' '+y; }
function today() { return new Date().toISOString().split('T')[0]; }
function daysUntil(day) { const d=new Date(),c=d.getDate(),dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate(); return day>c?day-c:dim-c+day; }
function getLastCutoff(cutDay) { const n=new Date(),y=n.getFullYear(),m=n.getMonth(); return n.getDate()>=cutDay?new Date(y,m,cutDay):new Date(y,m-1,cutDay); }
function getNextCutoff(cutDay) { const n=new Date(),y=n.getFullYear(),m=n.getMonth(); return n.getDate()<cutDay?new Date(y,m,cutDay):new Date(y,m+1,cutDay); }
function getDeadline(cutDay,dias) { const c=getLastCutoff(cutDay); const d=new Date(c); d.setDate(d.getDate()+dias); return d; }
function calcDR(bruto) {
  const afp=bruto*0.0287, sfs=bruto*0.0304, base=bruto-afp-sfs, anual=base*12;
  let isr=0;
  if(anual<=416220) isr=0;
  else if(anual<=624329) isr=(anual-416220)*0.15;
  else if(anual<=867123) isr=31216.35+(anual-624329)*0.2;
  else isr=79776.15+(anual-867123)*0.25;
  isr/=12;
  return {afp,sfs,isr,neto:bruto-afp-sfs-isr};
}
function pct(a,b) { return b>0?(a/b*100):0; }
function clamp(v,min,max) { return Math.max(min,Math.min(max,v)); }

// ============================================================
// DATA LOADING
// ============================================================
async function loadAll() {
  const [tx,cc,lo,lp,bc,vi,sd,st,ing,pl] = await Promise.all([
    db.from('transactions').select('*').order('fecha',{ascending:false}),
    db.from('credit_cards').select('*'),
    db.from('loans').select('*'),
    db.from('loan_payments').select('*').order('fecha',{ascending:false}),
    db.from('budget_categories').select('*').order('orden'),
    db.from('variable_income').select('*').order('fecha',{ascending:false}),
    db.from('savings_deposits').select('*').order('fecha',{ascending:true}),
    db.from('settings').select('*'),
    db.from('ingresos').select('*').order('fecha',{ascending:false}),
    db.from('ingreso_plantillas').select('*').order('orden'),
  ]);
  state.transactions = tx.data||[];
  state.creditCards = cc.data||[];
  state.loans = lo.data||[];
  state.loanPayments = lp.data||[];
  state.budgetCategories = bc.data||[];
  state.variableIncome = vi.data||[];
  state.savingsDeposits = sd.data||[];
  state.ingresos = ing.data||[];
  state.plantillas = pl.data||[];
  const themeSetting = (st.data||[]).find(s=>s.key==='theme');
  if(themeSetting) { const v = themeSetting.value; state.theme = (typeof v === 'string') ? v.replace(/"/g,'') : (v || 'light'); }
  document.documentElement.setAttribute('data-theme', state.theme);
}

// ============================================================
// RENDER ENGINE
// ============================================================
function render() {
  const app = $('#app');
  app.className = 'app';
  app.innerHTML = renderSidebar() + renderMain() + renderMobileNav();
  bindEvents();
}

function renderSidebar() {
  const items = [
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'transacciones',icon:'💳',label:'Transacciones'},
    {section:'Cuentas'},
    {id:'tarjetas',icon:'💎',label:'Tarjetas'},
    {id:'prestamos',icon:'🏦',label:'Préstamos'},
    {id:'ahorros',icon:'🐷',label:'Fondo de Inversión'},
    {section:'Planificación'},
    {id:'presupuesto',icon:'📋',label:'Presupuesto'},
    {id:'ingresos',icon:'💵',label:'Ingresos'},
    {id:'flujo-caja',icon:'📈',label:'Flujo de Caja'},
    {section:'Análisis'},
    {id:'analisis',icon:'🔍',label:'Análisis Financiero'},
  ];
  let nav = items.map(it => {
    if(it.section) return `<div class="nav-section-title">${it.section}</div>`;
    return `<div class="nav-item ${state.section===it.id?'active':''}" data-nav="${it.id}"><span class="nav-icon">${it.icon}</span>${it.label}</div>`;
  }).join('');

  return `<aside class="sidebar">
    <div class="sidebar-logo"><h1>💰 FinanzasRD</h1><span>Gestión financiera personal</span></div>
    <nav class="nav-section">${nav}</nav>
    <div class="sidebar-footer">
      <div style="padding:8px;margin-bottom:8px;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;color:var(--text-muted)">Sesión activa</div>
        <div style="font-size:13px;font-weight:600;color:var(--text-primary)">${state.user?state.user.email.split('@')[0]:''}</div>
      </div>
      <div class="flex-between" style="padding:8px">
        <span style="font-size:13px;color:var(--text-secondary)">${state.theme==='dark'?'🌙':'☀️'} Tema</span>
        <div class="toggle ${state.theme==='dark'?'on':''}" id="themeToggle"></div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="width:100%;justify-content:center;margin-top:8px">🚪 Cerrar Sesión</button>
    </div>
  </aside>`;
}

function renderMobileNav() {
  const items = [
    {id:'dashboard',icon:'📊',label:'Inicio'},
    {id:'transacciones',icon:'💳',label:'Trans.'},
    {id:'tarjetas',icon:'💎',label:'Tarjetas'},
    {id:'prestamos',icon:'🏦',label:'Prést.'},
    {id:'ahorros',icon:'🐷',label:'Ahorros'},
    {id:'presupuesto',icon:'📋',label:'Presup.'},
    {id:'ingresos',icon:'💵',label:'Ingres.'},
    {id:'flujo-caja',icon:'📈',label:'Flujo'},
    {id:'analisis',icon:'🔍',label:'Análisis'},
  ];
  return `<nav class="mobile-nav">${items.map(i=>`<button class="${state.section===i.id?'active':''}" data-nav="${i.id}"><span>${i.icon}</span>${i.label}</button>`).join('')}</nav>`;
}

function renderMain() {
  const views = {dashboard:viewDashboard,transacciones:viewTransacciones,tarjetas:viewTarjetas,prestamos:viewPrestamos,ahorros:viewAhorros,presupuesto:viewPresupuesto,ingresos:viewIngresos,'flujo-caja':viewFlujo,analisis:viewAnalisis};
  const fn = views[state.section] || viewDashboard;
  return `<main class="main">${fn()}</main>`;
}

// ============================================================
// VIEWS
// ============================================================
function viewDashboard() {
  const cm=curMonth(), mtx=state.transactions.filter(t=>t.fecha?.startsWith(cm));
  const gastos=mtx.filter(t=>t.tipo==='gasto').reduce((s,t)=>s+Number(t.monto),0);
  const monthIngresos=state.ingresos.filter(v=>v.fecha?.startsWith(cm));
  const totalIng=monthIngresos.reduce((s,v)=>s+Number(v.monto),0);
  const deudaTC=state.creditCards.reduce((s,c)=>s+Number(c.saldo_actual),0);
  const deudaP=state.loans.reduce((s,l)=>s+Number(l.monto_adeudado),0);
  const fijosCats=state.budgetCategories.filter(c=>(c.tipo_gasto||'fijo')!=='periodico');
  const presTotal=fijosCats.reduce((s,c)=>s+(Number(c.presupuesto_max)||Number(c.presupuesto)||0),0);
  const presUsado=fijosCats.reduce((s,cat)=>{
    return s+mtx.filter(t=>t.tipo==='gasto'&&t.categoria===cat.id).reduce((sum,t)=>sum+Number(t.monto),0);
  },0);

  // Alerts (only for fixed monthly categories, not periodic)
  let alerts='';
  state.budgetCategories.forEach(cat=>{
    if(cat.tipo_gasto==='periodico') return;
    const budRef=Number(cat.presupuesto_max)||Number(cat.presupuesto)||0;
    if(budRef===0) return;
    const spent=mtx.filter(t=>t.tipo==='gasto'&&t.categoria===cat.id).reduce((s,t)=>s+Number(t.monto),0);
    if(spent>=budRef) alerts+=`<div class="alert alert-danger">🚨 ${cat.icono} ${cat.nombre}: Presupuesto excedido — ${money(spent)} / ${money(budRef)}</div>`;
    else if(spent>=budRef*0.85) alerts+=`<div class="alert alert-warning">⚠️ ${cat.icono} ${cat.nombre}: Cerca del límite — ${money(spent)} / ${money(budRef)}</div>`;
  });

  // Upcoming payments
  const now=new Date();
  let upcoming=[];
  state.loans.forEach(l=>{
    if(l.estado==='pagado') return;
    if(l.direccion!=='otorgado' && l.dia_pago){const d=daysUntil(l.dia_pago);if(d<=15) upcoming.push({nombre:l.nombre,monto:l.cuota_mensual,dias:d});}
  });
  state.creditCards.forEach(c=>{const dl=getDeadline(c.fecha_corte,c.dias_limite_pago),diff=Math.ceil((dl-now)/(1000*60*60*24));if(diff<=15&&diff>=0&&Number(c.saldo_actual)>0) upcoming.push({nombre:(c.nombre_display||'TC '+c.banco),monto:c.saldo_actual,dias:diff});});
  upcoming.sort((a,b)=>a.dias-b.dias);

  // Overdue personal loan alerts
  state.loans.filter(l=>l.direccion==='otorgado'&&l.estado==='activo').forEach(l=>{
    const venc=l.fecha_vencimiento||l.fecha_finalizacion;
    if(venc && new Date(venc+'T00:00:00')<now) {
      alerts+=`<div class="alert alert-danger">🚨 Préstamo a ${l.persona||l.nombre}: Vencido desde ${fdate(venc)} — Pendiente: ${money(l.monto_adeudado)}</div>`;
    } else if(venc) {
      const diff=Math.ceil((new Date(venc+'T00:00:00')-now)/(1000*60*60*24));
      if(diff<=15&&diff>=0) alerts+=`<div class="alert alert-warning">⚠️ Préstamo a ${l.persona||l.nombre}: Vence en ${diff} días — Pendiente: ${money(l.monto_adeudado)}</div>`;
    }
  });

  // Debit card expiry alerts
  state.creditCards.filter(c=>c.tipo_tarjeta==='debito'&&c.fecha_vencimiento).forEach(c=>{
    const exp=new Date(c.fecha_vencimiento+'T00:00:00');
    const daysToExp=Math.ceil((exp-now)/(1000*60*60*24));
    if(daysToExp<=0) alerts+=`<div class="alert alert-danger">🚨 🏧 ${c.nombre_display||c.banco}: Tarjeta vencida desde ${fdate(c.fecha_vencimiento)}</div>`;
    else if(daysToExp<=30) alerts+=`<div class="alert alert-warning">⚠️ 🏧 ${c.nombre_display||c.banco}: Vence en ${daysToExp} días (${fdate(c.fecha_vencimiento)})</div>`;
  });

  // Budget mini
  let budgetMini='';
  if(presTotal>0) {
    const pctUsed=pct(presUsado,presTotal);
    const color=presUsado>presTotal?'var(--danger)':presUsado>presTotal*0.85?'var(--warning)':'var(--success)';
    let cats=fijosCats.filter(c=>Number(c.presupuesto)>0).slice(0,5).map(cat=>{
      const sp=mtx.filter(t=>t.tipo==='gasto'&&t.categoria===cat.id).reduce((s,t)=>s+Number(t.monto),0);
      const p=pct(sp,Number(cat.presupuesto));
      return `<div style="margin-bottom:10px"><div class="flex-between" style="margin-bottom:4px"><span style="font-size:12px">${cat.icono} ${cat.nombre}</span><span class="mono" style="font-size:11px;color:${p>100?'var(--danger)':'var(--text-secondary)'}">${money(sp)} / ${money(cat.presupuesto)}</span></div><div class="progress-bar" style="height:5px"><div class="progress-fill" style="width:${clamp(p,0,100)}%;background:${p>100?'var(--danger)':p>85?'var(--warning)':'var(--accent)'}"></div></div></div>`;
    }).join('');
    budgetMini=`<div class="flex-between mb-4"><span style="font-size:13px;color:var(--text-secondary)">${money(presUsado)} de ${money(presTotal)}</span><span class="badge ${presUsado>presTotal?'badge-danger':presUsado>presTotal*0.85?'badge-warning':'badge-success'}">${Math.round(pctUsed)}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${clamp(pctUsed,0,100)}%;background:${color}"></div></div><div style="margin-top:16px">${cats}</div><button class="btn btn-ghost btn-sm mt-4" data-nav="presupuesto">Ver todo →</button>`;
  } else {
    budgetMini=`<div class="empty-state"><div class="empty-icon">📋</div><p>Configura tu presupuesto mensual</p><button class="btn btn-primary btn-sm mt-4" data-nav="presupuesto">Configurar</button></div>`;
  }

  // CC utilization
  let ccUtil=state.creditCards.map(cc=>{
    const p=pct(Number(cc.saldo_actual),Number(cc.monto_aprobado));
    return `<div style="margin-bottom:12px"><div class="flex-between" style="margin-bottom:4px"><span style="font-size:12px;font-weight:600">TC ${cc.banco}</span><span class="badge ${p>80?'badge-danger':p>50?'badge-warning':'badge-success'}">${p.toFixed(0)}%</span></div><div class="progress-bar" style="height:6px"><div class="progress-fill" style="width:${clamp(p,0,100)}%;background:${p>80?'var(--danger)':p>50?'var(--warning)':'var(--accent)'}"></div></div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">${money(cc.saldo_actual)} de ${money(cc.monto_aprobado)}</div></div>`;
  }).join('');

  // Recent tx
  let recentTx='';
  if(state.transactions.length>0) {
    const rows=state.transactions.slice(0,10).map(t=>{
      const cat=state.budgetCategories.find(c=>c.id===t.categoria);
      const metodo=t.metodo_pago==='efectivo'?'Efectivo':(()=>{const c=state.creditCards.find(x=>x.id===t.metodo_pago);return c?(c.nombre_display||c.banco):t.metodo_pago;})();
      return `<tr><td class="mono" style="font-size:12px">${fdate(t.fecha)}</td><td>${t.descripcion||'—'}</td><td>${cat?cat.icono+' '+cat.nombre:'—'}</td><td><span class="badge badge-neutral">${metodo}</span></td><td class="text-right mono fw-700" style="color:${t.tipo==='gasto'?'var(--danger)':'var(--success)'}">${t.tipo==='gasto'?'-':'+'} ${money(t.monto)}</td></tr>`;
    }).join('');
    recentTx=`<div class="table-container"><table><thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Método</th><th class="text-right">Monto</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  } else {
    recentTx=`<div class="empty-state"><div class="empty-icon">📝</div><p>No hay transacciones registradas</p><button class="btn btn-primary btn-sm mt-4" data-nav="transacciones">Agregar primera transacción</button></div>`;
  }

  return `<div class="page-header"><h2>Dashboard</h2><p>${monthLabel(cm)} — Resumen de tus finanzas</p></div>
  ${alerts}
  <div class="grid-4 mb-6">
    <div class="stat-card"><div class="stat-label">Ingresos del Mes</div><div class="stat-value positive">${money(totalIng)}</div><div class="stat-sub">Fijos + Variables</div></div>
    <div class="stat-card"><div class="stat-label">Gastos del Mes</div><div class="stat-value negative">${money(gastos)}</div><div class="stat-sub">${mtx.filter(t=>t.tipo==='gasto').length} transacciones</div></div>
    <div class="stat-card"><div class="stat-label">Balance Neto</div><div class="stat-value ${totalIng-gastos>=0?'positive':'negative'}">${money(totalIng-gastos)}</div><div class="stat-sub">Disponible estimado</div></div>
    <div class="stat-card"><div class="stat-label">Deuda Total</div><div class="stat-value">${money(deudaTC+deudaP)}</div><div class="stat-sub">Tarjetas + Préstamos</div></div>
  </div>
  <div class="grid-2 mb-6">
    <div class="card"><div class="card-title">Presupuesto del Mes</div>${budgetMini}</div>
    <div class="card"><div class="card-title">Próximos Pagos</div>${upcoming.length>0?upcoming.map(p=>`<div class="flex-between" style="padding:10px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:600">${p.nombre}</div><div style="font-size:12px;color:var(--text-muted)">${p.dias===0?'Hoy':'En '+p.dias+' días'}</div></div><div class="mono fw-700" style="font-size:14px">${money(p.monto)}</div></div>`).join(''):`<div class="empty-state" style="padding:20px"><div style="font-size:32px">✅</div><p style="font-size:13px">No hay pagos próximos en 15 días</p></div>`}
    <div style="margin-top:20px"><div class="card-title">Utilización de Crédito</div>${ccUtil}</div></div>
  </div>
  <div class="card"><div class="flex-between mb-4"><div class="card-title" style="margin-bottom:0">Últimas Transacciones</div><button class="btn btn-ghost btn-sm" data-nav="transacciones">Ver todas →</button></div>${recentTx}</div>`;
}

// ============================================================
// TRANSACCIONES
// ============================================================
function viewTransacciones() {
  const cm=curMonth();
  const catOpts=state.budgetCategories.map(c=>`<option value="${c.id}">${c.icono} ${c.nombre}</option>`).join('');
  const cardOpts=state.creditCards.map(c=>`<option value="${c.id}">${c.tipo_tarjeta==='debito'?'🏧':'💳'} ${c.nombre_display||c.banco}</option>`).join('');
  
  function getCardLabel(metodo) {
    if(metodo==='efectivo') return 'Efectivo';
    const cc=state.creditCards.find(c=>c.id===metodo);
    return cc?(cc.nombre_display||cc.banco):metodo;
  }
  
  let rows=state.transactions.slice(0,50).map(t=>{
    const cat=state.budgetCategories.find(c=>c.id===t.categoria);
    const metodo=t.metodo_pago==='efectivo'?'Efectivo':getCardLabel(t.metodo_pago);
    return `<tr><td class="mono" style="font-size:12px">${fdate(t.fecha)}</td><td>${t.descripcion||'—'}</td><td style="font-size:13px">${cat?cat.icono+' '+cat.nombre:'—'}</td><td><span class="badge badge-neutral">${metodo}</span></td><td class="text-right mono fw-700" style="color:${t.tipo==='gasto'?'var(--danger)':'var(--success)'}">${t.tipo==='gasto'?'-':'+'} ${money(t.monto)}</td><td><button class="btn-icon" onclick="deleteTx('${t.id}')">🗑</button></td></tr>`;
  }).join('');

  return `<div class="page-header"><h2>Transacciones</h2><p>Registro y seguimiento de todos tus movimientos</p></div>
  <div class="card mb-6">
    <div class="card-title">Nueva Transacción</div>
    <div class="grid-2" style="gap:12px">
      <div class="form-group"><label class="form-label">Tipo</label><select class="form-select" id="txTipo"><option value="gasto">Gasto</option><option value="ingreso">Ingreso</option><option value="pago-tc">Pago a Tarjeta</option></select></div>
      <div class="form-group"><label class="form-label">Monto (RD$)</label><input class="form-input" type="number" id="txMonto" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="txCat">${catOpts}</select></div>
      <div class="form-group"><label class="form-label">Método de Pago</label><select class="form-select" id="txMetodo"><option value="efectivo">💵 Efectivo</option>${cardOpts}</select></div>
      <div class="form-group"><label class="form-label">Fecha</label><input class="form-input" type="date" id="txFecha" value="${today()}"></div>
      <div class="form-group"><label class="form-label">Descripción (opcional)</label><input class="form-input" id="txDesc" placeholder="Nota rápida..."></div>
    </div>
    <button class="btn btn-primary mt-4" onclick="addTransaction()">➕ Registrar Transacción</button>
  </div>
  <div class="card">${rows.length>0?`<div class="table-container"><table><thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Método</th><th class="text-right">Monto</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty-state"><div class="empty-icon">📭</div><p>No hay transacciones</p></div>'}</div>`;
}

// ============================================================
// TARJETAS
// ============================================================
function viewTarjetas() {
  const now=new Date();
  const creditos=state.creditCards.filter(c=>c.tipo_tarjeta!=='debito');
  const debitos=state.creditCards.filter(c=>c.tipo_tarjeta==='debito');

  function renderCard(cc) {
    const isCredit=cc.tipo_tarjeta!=='debito';
    const cardColor=cc.color||'#2d5a27';
    const util=isCredit?pct(Number(cc.saldo_actual),Number(cc.monto_aprobado)):0;
    const disp=Number(cc.monto_aprobado)-Number(cc.saldo_actual);
    const displayName=cc.nombre_display||('Banco '+cc.banco);

    // Credit-specific info
    let deadlineInfo='',cycleVis='';
    if(isCredit){
      const nextCorte=getNextCutoff(cc.fecha_corte);
      const lastCorte=getLastCutoff(cc.fecha_corte);
      const diasNextCorte=Math.ceil((nextCorte-now)/(1000*60*60*24));
      const dl=getDeadline(cc.fecha_corte,cc.dias_limite_pago);
      const diasP=Math.ceil((dl-now)/(1000*60*60*24));
      const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
      const dayPos=((now.getDate()-1)/dim)*100;
      const cortePos=((cc.fecha_corte-1)/dim)*100;
      deadlineInfo=`<div><div class="stat-label">Último Corte</div><div style="font-size:14px;font-weight:600">${lastCorte.getDate()} ${MONTHS_ES[lastCorte.getMonth()]}</div></div>
      <div><div class="stat-label">Próximo Corte</div><div style="font-size:14px;font-weight:600">${nextCorte.getDate()} ${MONTHS_ES[nextCorte.getMonth()]} <span class="badge badge-neutral" style="margin-left:4px">en ${diasNextCorte} días</span></div></div>
      <div><div class="stat-label">Fecha Límite Pago</div><div style="font-size:14px;font-weight:600">${dl.getDate()} ${MONTHS_ES[dl.getMonth()]} <span class="badge ${diasP<=0?'badge-danger':diasP<=5?'badge-danger':diasP<=10?'badge-warning':'badge-success'}" style="margin-left:4px">${diasP<=0?'Vencido':diasP+' días'}</span></div></div>
      <div><div class="stat-label">Sobregiro</div><div style="font-size:14px">${money(cc.monto_sobregiro)}</div></div>`;
      cycleVis=`<div style="margin-top:20px"><div class="stat-label">Ciclo de Facturación</div>
        <div style="position:relative;height:40px;background:var(--bg-tertiary);border-radius:8px;overflow:hidden;margin-top:8px">
          <div style="position:absolute;left:0;top:0;height:100%;width:${dayPos}%;background:${cardColor};opacity:0.3;border-radius:8px"></div>
          <div style="position:absolute;left:${dayPos}%;top:0;width:3px;height:100%;background:${cardColor};border-radius:2px;z-index:2"></div>
          <div style="position:absolute;left:${cortePos}%;top:0;width:2px;height:100%;background:var(--danger);border-radius:1px;z-index:2"></div>
        </div>
        <div class="flex-between" style="margin-top:4px"><span style="font-size:10px;color:${cardColor};font-weight:600">Hoy (${now.getDate()})</span><span style="font-size:10px;color:var(--danger);font-weight:600">Corte (${cc.fecha_corte})</span></div>
      </div>`;
    }

    // Debit-specific: expiry alert
    let expiryInfo='';
    if(!isCredit && cc.fecha_vencimiento) {
      const exp=new Date(cc.fecha_vencimiento+'T00:00:00');
      const daysToExp=Math.ceil((exp-now)/(1000*60*60*24));
      const vencMM=cc.fecha_vencimiento.substring(5,7);
      const vencYY=cc.fecha_vencimiento.substring(0,4);
      expiryInfo=`<div><div class="stat-label">Vencimiento</div><div style="font-size:14px;font-weight:600">${vencMM}/${vencYY} <span class="badge ${daysToExp<=30?'badge-danger':daysToExp<=90?'badge-warning':'badge-neutral'}" style="margin-left:4px">${daysToExp>0?daysToExp+' días':'Vencida'}</span></div></div>`;
    }

    return `<div>
      <div class="cc-visual" style="background:linear-gradient(135deg,${cardColor},${cardColor}88)">
        <div class="flex-between"><div style="font-size:16px;font-weight:700">${displayName}</div><span style="font-size:11px;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:10px">${isCredit?'💳 Crédito':'🏧 Débito'}</span></div>
        <div style="font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:1px;margin-top:10px">${isCredit?'Saldo Actual':'Saldo Disponible'}</div>
        <div class="mono" style="font-size:24px;font-weight:700;margin-top:4px">${money(isCredit?cc.saldo_actual:cc.saldo_actual)}</div>
        ${isCredit?`<div style="margin-top:12px;height:6px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${clamp(util,0,100)}%;background:${util>80?'#e74c3c':util>50?'#f0c040':'#2ecc71'}"></div></div><div style="font-size:11px;opacity:0.7;margin-top:6px">${util.toFixed(1)}% utilizado</div>`:''}
      </div>
      <div class="card mt-4">
        <div class="flex-between mb-4">
          <div class="stat-label" style="margin-bottom:0">Detalles</div>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" onclick="showEditCard('${cc.id}')">✏️ Editar</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteCard('${cc.id}')">🗑</button>
          </div>
        </div>
        <div style="background:var(--bg-tertiary);border-radius:var(--radius-sm);padding:12px;margin-bottom:16px">
          <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">⚡ Ajustar Saldo Rápido</div>
          <div class="flex gap-2">
            <input class="form-input" type="number" placeholder="Saldo real..." id="adj-${cc.id}" style="flex:1;padding:8px 10px;font-size:13px">
            <button class="btn btn-primary btn-sm" onclick="adjustCardBalance('${cc.id}')">Ajustar</button>
          </div>
        </div>
        <div class="grid-2" style="gap:12px">
          ${isCredit?`<div><div class="stat-label">Límite Aprobado</div><div class="mono fw-700" style="font-size:16px">${money(cc.monto_aprobado)}</div></div>
          <div><div class="stat-label">Disponible</div><div class="mono fw-700" style="font-size:16px;color:${disp>0?'var(--success)':'var(--danger)'}">${money(disp)}</div></div>`
          :`<div><div class="stat-label">Banco</div><div style="font-size:14px;font-weight:600">${cc.banco}</div></div>`}
          ${deadlineInfo}
          ${expiryInfo}
        </div>
        ${cycleVis}
      </div>
    </div>`;
  }

  // Color presets
  const colors=['#2d5a27','#1a3a6b','#8b0000','#4a4a4a','#1a1a1a','#6b3fa0','#c0392b','#2980b9','#d4a017','#16a085','#e67e22','#7f8c8d'];
  const colorPicker=colors.map(c=>`<div onclick="document.getElementById('ncColor').value='${c}';document.getElementById('ncColorPreview').style.background='${c}'" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:2px solid var(--border)"></div>`).join('');

  // New Card Form with smart fields
  const newCardForm=`<div class="card mb-6" id="newCardForm" style="display:none">
    <div class="card-title">Nueva Tarjeta</div>
    <div class="grid-2" style="gap:12px">
      <div class="form-group"><label class="form-label">Banco / Nombre</label><input class="form-input" id="ncBanco" placeholder="Ej: BHD, Popular..."></div>
      <div class="form-group"><label class="form-label">Tipo</label><select class="form-select" id="ncTipo" onchange="toggleCardFields()"><option value="credito">💳 Crédito</option><option value="debito">🏧 Débito</option></select></div>
      <div class="form-group"><label class="form-label">Color</label><div class="flex gap-2 flex-wrap" style="margin-bottom:8px">${colorPicker}</div><input type="hidden" id="ncColor" value="#2d5a27"><div id="ncColorPreview" style="width:100%;height:8px;border-radius:4px;background:#2d5a27"></div></div>
      <div class="form-group"><label class="form-label">Saldo Actual</label><input class="form-input" type="number" id="ncSaldo" placeholder="0.00"></div>
      <div class="form-group ncCreditField"><label class="form-label">Límite Aprobado</label><input class="form-input" type="number" id="ncLimite" placeholder="0.00"></div>
      <div class="form-group ncCreditField"><label class="form-label">Monto Sobregiro</label><input class="form-input" type="number" id="ncSobregiro" placeholder="0.00"></div>
      <div class="form-group ncCreditField"><label class="form-label">Día de Corte</label><input class="form-input" type="number" id="ncCorte" placeholder="1-31" min="1" max="31"></div>
      <div class="form-group ncCreditField"><label class="form-label">Días Límite de Pago</label><input class="form-input" type="number" id="ncDiasPago" placeholder="Ej: 25"></div>
      <div class="form-group ncDebitField" style="display:none"><label class="form-label">Vencimiento (MM/AAAA)</label><div class="flex gap-2"><select class="form-select" id="ncVencMes" style="width:100px">${[...Array(12)].map((_,i)=>`<option value="${String(i+1).padStart(2,'0')}">${String(i+1).padStart(2,'0')}</option>`).join('')}</select><input class="form-input" type="number" id="ncVencAnio" placeholder="2028" style="width:100px"></div></div>
    </div>
    <div class="flex gap-2 mt-4">
      <button class="btn btn-primary" onclick="saveNewCard()">💾 Guardar Tarjeta</button>
      <button class="btn btn-ghost" onclick="$('#newCardForm').style.display='none'">Cancelar</button>
    </div>
  </div>`;

  const creditCards=creditos.map(renderCard).join('');
  const debitCards=debitos.map(renderCard).join('');

  return `<div class="page-header">
    <div class="flex-between">
      <div><h2>Tarjetas</h2><p>Administra tus tarjetas de crédito y débito</p></div>
      <button class="btn btn-primary" onclick="$('#newCardForm').style.display='block'">➕ Nueva Tarjeta</button>
    </div>
  </div>
  ${newCardForm}
  ${creditos.length>0?`<div class="card-title mb-4">💳 Tarjetas de Crédito</div><div class="grid-2 mb-6">${creditCards}</div>`:''}
  ${debitos.length>0?`<div class="card-title mb-4">🏧 Tarjetas de Débito</div><div class="grid-2 mb-6">${debitCards}</div>`:''}
  ${state.creditCards.length===0?'<div class="card"><div class="empty-state"><div class="empty-icon">💳</div><p>No hay tarjetas registradas</p></div></div>':''}`;
}

// ============================================================
// PRESTAMOS
// ============================================================
function viewPrestamos() {
  const now=new Date();
  const tomados=state.loans.filter(l=>l.direccion!=='otorgado');
  const otorgados=state.loans.filter(l=>l.direccion==='otorgado');

  function renderLoan(loan) {
    const isOtorgado=loan.direccion==='otorgado';
    const payments=state.loanPayments.filter(p=>p.loan_id===loan.id);
    const montoBase=isOtorgado?Number(loan.monto_original||loan.monto_desembolsado||loan.monto_adeudado):loan.tipo==='prestamo'?Number(loan.monto_original):Number(loan.monto_desembolsado);
    const progress=montoBase>0?pct(montoBase-Number(loan.monto_adeudado),montoBase):0;
    const diasP=loan.dia_pago?daysUntil(loan.dia_pago):null;
    const colorAccent=isOtorgado?'var(--accent)':'var(--danger)';
    const colorBg=isOtorgado?'var(--success-light)':'var(--danger-light)';
    
    // Status
    let estadoBadge='';
    if(loan.estado==='pagado') estadoBadge='<span class="badge badge-success">✅ Pagado</span>';
    else if(loan.estado==='mora') estadoBadge='<span class="badge badge-danger">⚠️ En Mora</span>';
    else {
      // Check if overdue
      const venc=loan.fecha_vencimiento||loan.fecha_finalizacion;
      if(venc && new Date(venc+'T00:00:00')<now && Number(loan.monto_adeudado)>0) estadoBadge='<span class="badge badge-danger">⚠️ Vencido</span>';
      else estadoBadge='<span class="badge badge-success">Activo</span>';
    }

    let historial=payments.slice(0,5).map(p=>`<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--border)"><span class="mono" style="font-size:12px">${fdate(p.fecha)}</span><span class="mono fw-700" style="font-size:13px;color:var(--success)">${money(p.monto)}</span></div>`).join('');

    let personaInfo='';
    if(isOtorgado) {
      personaInfo=`<div class="grid-2" style="gap:12px;margin-bottom:16px;padding:12px;background:var(--bg-tertiary);border-radius:var(--radius-sm)">
        <div><div class="stat-label">Persona</div><div style="font-size:14px;font-weight:600">${loan.persona||'—'}</div></div>
        <div><div class="stat-label">Contacto</div><div style="font-size:14px">${loan.contacto||'—'}</div></div>
      </div>`;
    }

    return `<div class="card mb-6" style="border-left:4px solid ${colorAccent}">
      <div class="flex-between mb-4">
        <div>
          <div class="flex gap-2" style="align-items:center;gap:8px">
            <h3 style="font-size:18px;font-weight:700">${loan.nombre}</h3>
            ${estadoBadge}
            <span class="badge ${isOtorgado?'badge-success':'badge-danger'}">${isOtorgado?'📤 Otorgado':'📥 Tomado'}</span>
          </div>
          ${diasP!==null?`<span class="badge badge-neutral" style="margin-top:4px">Pago día ${loan.dia_pago} — en ${diasP} días</span>`:''}
          ${loan.pago_unico?'<span class="badge badge-neutral" style="margin-top:4px;margin-left:4px">Pago único</span>':''}
        </div>
        <div class="text-right">
          <div class="stat-label">${isOtorgado?'Te deben':'Adeudado'}</div>
          <div class="mono" style="font-size:22px;font-weight:700;color:${colorAccent}">${money(loan.monto_adeudado)}</div>
        </div>
      </div>
      ${personaInfo}
      <div class="progress-bar mb-4" style="height:10px"><div class="progress-fill" style="width:${progress}%;background:var(--success)"></div></div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">${progress.toFixed(1)}% ${isOtorgado?'cobrado':'pagado'}</div>
      <div class="grid-4" style="gap:12px;margin-bottom:16px">
        <div><div class="stat-label">${loan.pago_unico?'Monto Total':'Cuota Mensual'}</div><div class="mono fw-700">${money(loan.pago_unico?loan.monto_adeudado:loan.cuota_mensual)}</div></div>
        ${Number(loan.tasa)>0?`<div><div class="stat-label">Tasa</div><div class="fw-700">${loan.tasa}%</div></div>`:`<div><div class="stat-label">Tasa</div><div class="fw-700">—</div></div>`}
        <div><div class="stat-label">${loan.fecha_vencimiento?'Vencimiento':'Finalización'}</div><div style="font-size:13px">${fdate(loan.fecha_vencimiento||loan.fecha_finalizacion)}</div></div>
        <div><div class="stat-label">${isOtorgado?'Abonos Recibidos':'Pagos Realizados'}</div><div class="fw-700">${payments.length}</div></div>
      </div>
      ${loan.estado!=='pagado'?`<div class="flex gap-4 flex-wrap" style="align-items:flex-end">
        ${!loan.pago_unico&&loan.cuota_mensual?`<button class="btn btn-primary" onclick="payLoan('${loan.id}')">${isOtorgado?'💰 Registrar Abono':'✅ Registrar Pago'} (${money(loan.cuota_mensual)})</button>`:''}
        <div class="flex gap-2" style="align-items:center">
          <input class="form-input" type="number" placeholder="${isOtorgado?'Abono recibido':'Monto extra'}" id="extra-${loan.id}" style="width:150px">
          <button class="btn btn-ghost" onclick="payLoanExtra('${loan.id}')">${isOtorgado?'Registrar Abono':'Pago Extra'}</button>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="markLoanStatus('${loan.id}','pagado')">✅ Marcar como pagado</button>
        ${isOtorgado&&loan.estado!=='mora'?`<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="markLoanStatus('${loan.id}','mora')">⚠️ Marcar en mora</button>`:''}
      </div>
      ${!loan.pago_unico?`<div style="margin-top:12px;font-size:12px;color:var(--text-muted)">Cuota actual: ${money(loan.cuota_mensual)} — <a href="#" style="color:var(--accent)" onclick="changeCuota('${loan.id}',${loan.cuota_mensual});return false">Cambiar cuota</a></div>`:''}
      `:'<div style="padding:12px;background:var(--success-light);border-radius:var(--radius-sm);text-align:center;color:var(--success);font-weight:600">✅ Este préstamo ha sido saldado</div>'}
      <div class="flex gap-2 mt-4">
        <button class="btn btn-ghost btn-sm" onclick="editLoan('${loan.id}')">✏️ Editar</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteLoan('${loan.id}')">🗑 Eliminar</button>
      </div>
      ${payments.length>0?`<div style="margin-top:16px"><div class="stat-label">Historial de ${isOtorgado?'Abonos':'Pagos'}</div>${historial}</div>`:''}
    </div>`;
  }

  // New Loan Form
  const newLoanForm=`<div class="card mb-6" id="newLoanForm" style="display:none">
    <div class="card-title">Nuevo Préstamo</div>
    <div class="grid-2" style="gap:12px">
      <div class="form-group"><label class="form-label">Dirección</label><select class="form-select" id="nlDir" onchange="toggleLoanFields()"><option value="tomado">📥 Préstamo Tomado (yo debo)</option><option value="otorgado">📤 Préstamo Otorgado (me deben)</option></select></div>
      <div class="form-group"><label class="form-label">Nombre / Descripción</label><input class="form-input" id="nlNombre" placeholder="Ej: Préstamo carro, Préstamo a Juan..."></div>
      <div class="form-group" id="nlPersonaGrp" style="display:none"><label class="form-label">Persona</label><input class="form-input" id="nlPersona" placeholder="Nombre de la persona"></div>
      <div class="form-group" id="nlContactoGrp" style="display:none"><label class="form-label">Contacto / Nota</label><input class="form-input" id="nlContacto" placeholder="Teléfono, detalle..."></div>
      <div class="form-group"><label class="form-label">Monto Total</label><input class="form-input" type="number" id="nlMonto" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Monto Adeudado Actual</label><input class="form-input" type="number" id="nlAdeudado" placeholder="0.00 (si es igual, déjalo vacío)"></div>
      <div class="form-group"><label class="form-label">Tipo de Pago</label><select class="form-select" id="nlPagoTipo" onchange="toggleCuotaField()"><option value="cuotas">Cuotas mensuales</option><option value="unico">Pago único</option></select></div>
      <div class="form-group" id="nlCuotaGrp"><label class="form-label">Cuota Mensual</label><input class="form-input" type="number" id="nlCuota" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Tasa de Interés (%)</label><input class="form-input" type="number" id="nlTasa" placeholder="0 si no aplica" value="0"></div>
      <div class="form-group" id="nlDiaGrp"><label class="form-label">Día de Pago</label><input class="form-input" type="number" id="nlDia" placeholder="1-31" min="1" max="31"></div>
      <div class="form-group"><label class="form-label">Fecha de Vencimiento / Finalización</label><input class="form-input" type="date" id="nlVenc"></div>
    </div>
    <div class="flex gap-2 mt-4">
      <button class="btn btn-primary" onclick="saveNewLoan()">💾 Guardar Préstamo</button>
      <button class="btn btn-ghost" onclick="$('#newLoanForm').style.display='none'">Cancelar</button>
    </div>
  </div>`;

  // Summary cards
  const totalTeDeben=otorgados.filter(l=>l.estado!=='pagado').reduce((s,l)=>s+Number(l.monto_adeudado),0);
  const totalDebes=tomados.filter(l=>l.estado!=='pagado').reduce((s,l)=>s+Number(l.monto_adeudado),0);
  const enMora=otorgados.filter(l=>l.estado==='mora'||(l.estado==='activo'&&(l.fecha_vencimiento||l.fecha_finalizacion)&&new Date((l.fecha_vencimiento||l.fecha_finalizacion)+'T00:00:00')<now));

  return `<div class="page-header">
    <div class="flex-between">
      <div><h2>Préstamos</h2><p>Seguimiento de deudas y préstamos personales</p></div>
      <button class="btn btn-primary" onclick="$('#newLoanForm').style.display='block'">➕ Nuevo Préstamo</button>
    </div>
  </div>
  <div class="grid-3 mb-6">
    <div class="stat-card"><div class="stat-label">Total que Debes</div><div class="stat-value negative">${money(totalDebes)}</div><div class="stat-sub">${tomados.filter(l=>l.estado!=='pagado').length} préstamos activos</div></div>
    <div class="stat-card"><div class="stat-label">Total que te Deben</div><div class="stat-value positive">${money(totalTeDeben)}</div><div class="stat-sub">${otorgados.filter(l=>l.estado!=='pagado').length} préstamos activos</div></div>
    <div class="stat-card"><div class="stat-label">En Mora</div><div class="stat-value ${enMora.length>0?'negative':''}">${enMora.length}</div><div class="stat-sub">${enMora.length>0?money(enMora.reduce((s,l)=>s+Number(l.monto_adeudado),0))+' pendiente':'Todo al día ✅'}</div></div>
  </div>
  ${newLoanForm}
  ${tomados.length>0?`<div style="margin-bottom:12px"><div class="card-title">📥 Préstamos Tomados</div></div>${tomados.map(renderLoan).join('')}`:''}
  ${otorgados.length>0?`<div style="margin-bottom:12px;margin-top:24px"><div class="card-title">📤 Préstamos Otorgados</div></div>${otorgados.map(renderLoan).join('')}`:''}
  ${tomados.length===0&&otorgados.length===0?'<div class="card"><div class="empty-state"><div class="empty-icon">🏦</div><p>No hay préstamos registrados</p></div></div>':''}`;
}

// ============================================================
// PRESUPUESTO
// ============================================================
function viewPresupuesto() {
  const cm=curMonth(), mtx=state.transactions.filter(t=>t.fecha?.startsWith(cm)&&t.tipo==='gasto');
  const allGastoTx=state.transactions.filter(t=>t.tipo==='gasto');
  const fijos=state.budgetCategories.filter(c=>(c.tipo_gasto||'fijo')==='fijo');
  const periodicos=state.budgetCategories.filter(c=>c.tipo_gasto==='periodico');
  
  const totalPFijo=fijos.reduce((s,c)=>s+(Number(c.presupuesto_max)||Number(c.presupuesto)||0),0);
  const totalGFijo=fijos.reduce((s,c)=>s+mtx.filter(t=>t.categoria===c.id).reduce((sum,t)=>sum+Number(t.monto),0),0);
  
  const today=new Date();
  const dayOfMonth=today.getDate();
  const daysInMonth=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const monthProgress=dayOfMonth/daysInMonth;

  // ---- CHART: Fixed budget vs actual ----
  const chartCats=fijos.filter(c=>(Number(c.presupuesto_max)||Number(c.presupuesto))>0).map(cat=>{
    const spent=mtx.filter(t=>t.categoria===cat.id).reduce((s,t)=>s+Number(t.monto),0);
    const budget=Number(cat.presupuesto_max)||Number(cat.presupuesto)||0;
    return {...cat,spent,budget};
  });
  const chartMax=chartCats.length>0?Math.max(...chartCats.map(c=>Math.max(c.spent,c.budget))):1;
  let chartHTML='';
  if(chartCats.length>0) {
    const bars=chartCats.map(c=>{
      const bH=Math.max(2,(c.budget/chartMax)*140);
      const sH=Math.max(c.spent>0?2:0,(c.spent/chartMax)*140);
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;min-width:50px">
        <div style="display:flex;align-items:flex-end;gap:3px;height:150px">
          <div style="width:16px;height:${bH}px;background:var(--accent);border-radius:3px 3px 0 0;opacity:0.4" title="Presupuesto: ${money(c.budget)}"></div>
          <div style="width:16px;height:${sH}px;background:${c.spent>c.budget?'var(--danger)':c.spent>c.budget*0.85?'var(--warning)':'var(--accent)'};border-radius:3px 3px 0 0" title="Gastado: ${money(c.spent)}"></div>
        </div>
        <div style="font-size:9px;color:var(--text-muted);margin-top:6px;text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.icono} ${c.nombre.split(' ')[0]}</div>
      </div>`;
    }).join('');
    chartHTML=`<div class="card mb-6">
      <div class="card-title">Presupuesto vs Gasto Real (Fijos)</div>
      <div style="display:flex;align-items:flex-end;gap:4px;overflow-x:auto;padding-bottom:8px">${bars}</div>
      <div class="flex gap-4 mt-4" style="justify-content:center">
        <div class="flex" style="align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:2px;background:var(--accent);opacity:0.4"></div><span style="font-size:11px;color:var(--text-muted)">Presupuesto</span></div>
        <div class="flex" style="align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:2px;background:var(--accent)"></div><span style="font-size:11px;color:var(--text-muted)">Gastado</span></div>
        <div class="flex" style="align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:2px;background:var(--danger)"></div><span style="font-size:11px;color:var(--text-muted)">Excedido</span></div>
      </div>
    </div>`;
  }

  // ---- FIXED ROWS ----
  const fijoRows=fijos.map(cat=>{
    const spent=mtx.filter(t=>t.categoria===cat.id).reduce((s,t)=>s+Number(t.monto),0);
    const bMin=Number(cat.presupuesto_min)||0;
    const bMax=Number(cat.presupuesto_max)||Number(cat.presupuesto)||0;
    const hasRange=bMin>0 && bMax>0 && bMin!==bMax;
    const budgetRef=bMax||bMin; // use max as the reference for progress
    const rem=budgetRef-spent;
    const p=budgetRef>0?pct(spent,budgetRef):0;
    const st=p>100?'danger':(hasRange&&spent>bMin?'warning':p>85?'warning':'success');
    let trend='';
    if(budgetRef>0 && spent>0) {
      const proj=spent/monthProgress;
      const projP=pct(proj,budgetRef);
      if(projP>110) trend=`<div style="font-size:10px;color:var(--danger);margin-top:2px">📈 Proyección: ${money(proj)}</div>`;
      else if(projP>90) trend=`<div style="font-size:10px;color:var(--warning);margin-top:2px">📈 Proyección: ${money(proj)}</div>`;
    }
    return `<tr data-cat="${cat.id}">
      <td><div class="fw-700">${cat.icono} ${cat.nombre}</div>${trend}</td>
      <td><div class="flex" style="gap:4px;align-items:center">
        <input class="form-input bud-min" type="number" value="${bMin||''}" onchange="updateBudgetRange('${cat.id}','min',this.value)" placeholder="Min" style="width:80px;padding:6px 8px;font-size:12px" title="Mínimo">
        <span style="color:var(--text-muted);font-size:12px">-</span>
        <input class="form-input bud-max" type="number" value="${bMax||''}" onchange="updateBudgetRange('${cat.id}','max',this.value)" placeholder="Max" style="width:80px;padding:6px 8px;font-size:12px" title="Máximo">
      </div>${hasRange?`<div style="font-size:10px;color:var(--text-muted);margin-top:2px">${money(bMin)} - ${money(bMax)}</div>`:''}</td>
      <td class="mono td-spent" style="color:var(--danger)">${money(spent)}</td>
      <td class="mono td-rem" style="color:${rem>=0?'var(--success)':'var(--danger)'}">${money(rem)}</td>
      <td style="width:100px">${budgetRef>0?`<div class="progress-bar" style="height:6px;position:relative">
        ${hasRange?`<div style="position:absolute;left:${clamp(pct(bMin,bMax),0,100)}%;top:-1px;width:1px;height:8px;background:var(--warning);z-index:2" title="Mín: ${money(bMin)}"></div>`:''}
        <div class="progress-fill" style="width:${clamp(p,0,100)}%;background:var(--${st})"></div>
      </div>`:''}</td>
      <td class="td-badge">${budgetRef>0?`<span class="badge badge-${st}">${p>100?'+'+Math.round(p-100)+'%':Math.round(p)+'%'}</span>`:''}</td>
      <td><div class="flex gap-2"><button class="btn-icon" title="Convertir a periódico" onclick="convertCat('${cat.id}','periodico')">🔄</button><button class="btn-icon" title="Eliminar" onclick="deleteCat('${cat.id}')" style="color:var(--danger)">🗑</button></div></td>
    </tr>`;
  }).join('');

  // ---- PERIODIC ROWS ----
  const periodicoRows=periodicos.map(cat=>{
    const montoEst=Number(cat.monto_total)||0;
    // Find all transactions for this category, sorted by date desc
    const catTx=allGastoTx.filter(t=>t.categoria===cat.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
    const lastTx=catTx.length>0?catTx[0]:null;
    const lastDate=lastTx?new Date(lastTx.fecha+'T00:00:00'):null;
    const daysSinceLast=lastDate?Math.floor((today-lastDate)/(1000*60*60*24)):null;
    
    // Calculate average days between purchases
    let avgDays=null;
    if(catTx.length>=2) {
      let totalDays=0;
      for(let i=0;i<catTx.length-1&&i<10;i++){
        const d1=new Date(catTx[i].fecha+'T00:00:00');
        const d2=new Date(catTx[i+1].fecha+'T00:00:00');
        totalDays+=Math.abs((d1-d2)/(1000*60*60*24));
      }
      avgDays=Math.round(totalDays/Math.min(catTx.length-1,10));
    }

    const spentThisMonth=mtx.filter(t=>t.categoria===cat.id).reduce((s,t)=>s+Number(t.monto),0);
    const isOverdue=avgDays&&daysSinceLast&&daysSinceLast>avgDays;

    return `<div class="card mb-4" style="border-left:3px solid ${isOverdue?'var(--warning)':'var(--border)'}">
      <div class="flex-between">
        <div>
          <div class="fw-700" style="font-size:15px">${cat.icono} ${cat.nombre}</div>
          ${montoEst>0?`<div style="font-size:12px;color:var(--text-muted);margin-top:2px">Estimado por evento: ${money(montoEst)}</div>`:''}
        </div>
        <div class="flex gap-2">
          <button class="btn-icon" title="Convertir a fijo mensual" onclick="convertCat('${cat.id}','fijo')">🔄</button>
          <button class="btn-icon" title="Eliminar" onclick="deleteCat('${cat.id}')" style="color:var(--danger)">🗑</button>
        </div>
      </div>
      <div class="grid-3 mt-4" style="gap:12px">
        <div>
          <div class="stat-label">Monto Estimado</div>
          <input class="form-input" type="number" value="${montoEst||''}" onchange="updatePeriodicMonto('${cat.id}',this.value)" placeholder="0.00" style="padding:6px 8px;font-size:13px">
        </div>
        <div>
          <div class="stat-label">Último Gasto</div>
          <div style="font-size:14px;font-weight:600">${lastTx?fdate(lastTx.fecha):'Sin registro'}</div>
          ${daysSinceLast!==null?`<div style="font-size:12px;color:${isOverdue?'var(--warning)':'var(--text-muted)'}">Hace ${daysSinceLast} días${isOverdue?' ⚠️':''}</div>`:''}
        </div>
        <div>
          <div class="stat-label">Promedio</div>
          <div style="font-size:14px;font-weight:600">${avgDays?'Cada '+avgDays+' días':'Calculando...'}</div>
          ${avgDays?`<div style="font-size:12px;color:var(--text-muted)">≈ ${money(montoEst/(avgDays/30))}/mes</div>`:''}
        </div>
      </div>
      ${spentThisMonth>0?`<div style="margin-top:12px;padding:8px 12px;background:var(--bg-tertiary);border-radius:var(--radius-sm);font-size:13px">💳 Gastado este mes: <span class="mono fw-700" style="color:var(--danger)">${money(spentThisMonth)}</span></div>`:''}
      ${catTx.length>0?`<div style="margin-top:12px"><div class="stat-label">Últimos 5 gastos</div>${catTx.slice(0,5).map(t=>`<div class="flex-between" style="padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px">${fdate(t.fecha)}</span><span class="mono" style="font-size:12px;font-weight:600">${money(t.monto)}</span></div>`).join('')}</div>`:''}
    </div>`;
  }).join('');

  // ---- NEW CATEGORY FORM ----
  const newCatForm=`<div class="card mb-6" id="newCatForm" style="display:none">
    <div class="card-title">Nueva Categoría</div>
    <div class="grid-2" style="gap:12px">

function viewIngresos() {
  const ded=calcDR(100000), cm=curMonth();
  const monthIng=state.ingresos.filter(v=>v.fecha?.startsWith(cm));
  const totalMes=monthIng.reduce((s,v)=>s+Number(v.monto),0);
  const cardOpts=state.creditCards.map(c=>`<option value="${c.id}">${c.tipo_tarjeta==='debito'?'🏧':'💳'} ${c.nombre_display||c.banco}</option>`).join('');
  
  // By source type
  const byType={};
  monthIng.forEach(v=>{const k=v.tipo_fuente||'otro';byType[k]=(byType[k]||0)+Number(v.monto);});
  const typeLabels={nomina:'💼 Nómina',iguala:'🏢 Iguala',cliente:'🎬 Cliente',freelance:'💻 Freelance',otro:'💵 Otro'};

  // Chart: last 6 months
  const last6=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');const total=state.ingresos.filter(v=>v.fecha?.startsWith(ym)).reduce((s,v)=>s+Number(v.monto),0);last6.push({month:MONTHS_ES[d.getMonth()],total});}
  const maxI=Math.max(...last6.map(m=>m.total),1);
  const bars=last6.map(m=>`<div class="chart-col"><div class="chart-val">${m.total>0?Math.round(m.total/1000)+'K':''}</div><div class="chart-bar" style="height:${Math.max(2,(m.total/maxI)*130)}px;background:var(--accent)"></div><div class="chart-label">${m.month}</div></div>`).join('');

  // Quick templates
  const templates=state.plantillas.map(p=>`<button class="btn btn-ghost" onclick="useTemplate('${p.id}')" style="padding:12px 16px"><div style="font-size:20px;margin-bottom:4px">${p.icono}</div><div style="font-size:12px;font-weight:600">${p.nombre}</div>${Number(p.monto_default)>0?`<div style="font-size:11px;color:var(--text-muted)">${money(p.monto_default)}</div>`:''}</button>`).join('');

  // History
  const history=state.ingresos.slice(0,30).map(v=>{
    const dest=v.destino==='efectivo'?'💵 Efectivo':(()=>{const c=state.creditCards.find(x=>x.id===v.destino);return c?(c.tipo_tarjeta==='debito'?'🏧':'💳')+' '+(c.nombre_display||c.banco):'💵';})();
    const typeLbl=typeLabels[v.tipo_fuente]||'💵 Otro';
    return `<tr><td class="mono" style="font-size:12px">${fdate(v.fecha)}</td><td style="font-weight:600">${v.fuente||'—'}</td><td><span class="badge badge-neutral">${typeLbl}</span></td><td><span class="badge badge-neutral">${dest}</span></td><td>${v.nota||''}</td><td class="text-right mono fw-700" style="color:var(--success)">+${money(v.monto)}</td><td><button class="btn-icon" onclick="deleteIngreso('${v.id}')">🗑</button></td></tr>`;
  }).join('');

  // By type breakdown
  const typeBreakdown=Object.entries(byType).map(([k,v])=>`<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${typeLabels[k]||k}</span><span class="mono fw-700">${money(v)}</span></div>`).join('');

  return `<div class="page-header"><h2>Ingresos</h2><p>${monthLabel(cm)} — Registro real de todos tus ingresos</p></div>
  <div class="grid-3 mb-6">
    <div class="stat-card"><div class="stat-label">Ingresos del Mes</div><div class="stat-value positive">${money(totalMes)}</div><div class="stat-sub">${monthIng.length} registros</div></div>
    <div class="stat-card"><div class="stat-label">Promedio Mensual (6m)</div><div class="stat-value positive">${money(last6.reduce((s,m)=>s+m.total,0)/6)}</div></div>
    <div class="stat-card"><div class="stat-label">Registros este Mes</div><div class="stat-value">${monthIng.length}</div></div>
  </div>
  
  ${templates.length>0?`<div class="card mb-6"><div class="card-title">⚡ Registro Rápido</div><div class="flex gap-4 flex-wrap">${templates}</div></div>`:''}

  <div class="card mb-6">
    <div class="card-title">Registrar Ingreso</div>
    <div class="grid-2" style="gap:12px">
      <div class="form-group"><label class="form-label">Monto (RD$)</label><input class="form-input" type="number" id="ingMonto" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Fuente</label><input class="form-input" id="ingFuente" placeholder="Ej: Nómina, Cliente X..."></div>
      <div class="form-group"><label class="form-label">Tipo</label><select class="form-select" id="ingTipo"><option value="nomina">💼 Nómina</option><option value="iguala">🏢 Iguala</option><option value="cliente">🎬 Cliente</option><option value="freelance">💻 Freelance</option><option value="otro">💵 Otro</option></select></div>
      <div class="form-group"><label class="form-label">Destino</label><select class="form-select" id="ingDestino" onchange="autoFillFromCard()"><option value="efectivo">💵 Efectivo</option>${cardOpts}</select></div>
      <div class="form-group"><label class="form-label">Fecha</label><input class="form-input" type="date" id="ingFecha" value="${today()}"></div>
      <div class="form-group"><label class="form-label">Nota (opcional)</label><input class="form-input" id="ingNota" placeholder="Detalle..."></div>
    </div>
    <button class="btn btn-primary mt-4" onclick="addIngreso()">➕ Registrar Ingreso</button>
  </div>

  <div class="grid-2 mb-6">
    <div class="card"><div class="card-title">Ingresos por Tipo (${monthLabel(cm)})</div>${typeBreakdown.length>0?typeBreakdown:'<div style="color:var(--text-muted);font-size:13px;padding:12px 0">Sin ingresos este mes</div>'}
      <div class="flex-between" style="padding:8px 0;font-weight:700;border-top:2px solid var(--border);margin-top:4px"><span>Total</span><span class="mono" style="color:var(--success)">${money(totalMes)}</span></div>
    </div>
    <div class="card"><div class="card-title">Referencia: Deducciones RD</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Para calcular cuánto esperar de nómina</div>
      <div style="font-size:13px">
        <div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--border)"><span>Salario Bruto</span><span class="mono fw-700">${money(100000)}</span></div>
        <div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--border)"><span>AFP (2.87%)</span><span class="mono" style="color:var(--danger)">-${money(ded.afp)}</span></div>
        <div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--border)"><span>SFS (3.04%)</span><span class="mono" style="color:var(--danger)">-${money(ded.sfs)}</span></div>
        <div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--border)"><span>ISR</span><span class="mono" style="color:var(--danger)">-${money(ded.isr)}</span></div>
        <div class="flex-between" style="padding:8px 0;font-weight:700"><span>Neto Estimado</span><span class="mono" style="color:var(--success)">${money(ded.neto)}</span></div>
      </div>
    </div>
  </div>

  <div class="card"><div class="card-title">Ingresos Últimos 6 Meses</div><div class="chart-bars">${bars}</div></div>

  <div class="card mt-4"><div class="card-title">Historial de Ingresos</div>${history.length>0?`<div class="table-container"><table><thead><tr><th>Fecha</th><th>Fuente</th><th>Tipo</th><th>Destino</th><th>Nota</th><th class="text-right">Monto</th><th></th></tr></thead><tbody>${history}</tbody></table></div>`:'<div class="empty-state"><div class="empty-icon">💵</div><p>No hay ingresos registrados</p></div>'}</div>`;
}

// ============================================================
// FLUJO DE CAJA
// ============================================================
function viewFlujo() {
  // Average monthly income from last 3 months of real data
  const last3=[];for(let i=2;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);last3.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));}
  const last3Income=state.ingresos.filter(v=>last3.some(m=>v.fecha?.startsWith(m)));
  const avgIncome=last3Income.reduce((s,v)=>s+Number(v.monto),0)/3;
  
  // By type averages
  const typeLabels={nomina:'💼 Nómina',iguala:'🏢 Iguala',cliente:'🎬 Clientes',freelance:'💻 Freelance',otro:'💵 Otros'};
  const byType={};
  last3Income.forEach(v=>{const k=v.tipo_fuente||'otro';byType[k]=(byType[k]||0)+Number(v.monto);});
  Object.keys(byType).forEach(k=>byType[k]=byType[k]/3);

  const oblLoans=state.loans.filter(l=>l.estado!=='pagado'&&l.direccion!=='otorgado').reduce((s,l)=>s+Number(l.cuota_mensual),0);
  const fijoCats=state.budgetCategories.filter(c=>(c.tipo_gasto||'fijo')!=='periodico');
  const budgetT=fijoCats.reduce((s,c)=>s+(Number(c.presupuesto_max)||Number(c.presupuesto)||0),0);

  const projs=[30,60,90].map(days=>{const m=days/30;const ing=avgIncome*m;const obl=(oblLoans+budgetT)*m;return{days,ing,obl,net:ing-obl};});

  const incomeBreakdown=Object.entries(byType).map(([k,v])=>`<div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)"><span>${typeLabels[k]||k}</span><span class="mono fw-700">${money(v)}</span></div>`).join('');

  return `<div class="page-header"><h2>Flujo de Caja Proyectado</h2><p>Proyección basada en tu promedio real de ingresos (últimos 3 meses)</p></div>
  <div class="grid-3 mb-6">${projs.map(p=>`<div class="card"><div class="card-title">Proyección ${p.days} Días</div>
    <div class="flex-between" style="padding:6px 0"><span style="font-size:13px;color:var(--text-secondary)">Ingresos estimados</span><span class="mono fw-700" style="color:var(--success)">${money(p.ing)}</span></div>
    <div class="flex-between" style="padding:6px 0"><span style="font-size:13px;color:var(--text-secondary)">Obligaciones</span><span class="mono fw-700" style="color:var(--danger)">${money(p.obl)}</span></div>
    <div style="border-top:2px solid var(--border);margin-top:8px;padding-top:8px"><div class="flex-between"><span class="fw-700" style="font-size:14px">Flujo Neto</span><span class="mono fw-700" style="font-size:18px;color:${p.net>=0?'var(--success)':'var(--danger)'}">${money(p.net)}</span></div></div>
  </div>`).join('')}</div>
  <div class="grid-2 mb-6">
    <div class="card"><div class="card-title">Promedio Mensual de Ingresos (3m)</div><div style="font-size:13px">
      ${incomeBreakdown||'<div style="color:var(--text-muted);padding:8px 0">Sin datos suficientes</div>'}
      <div class="flex-between" style="padding:10px 0;font-weight:700;font-size:14px;border-top:2px solid var(--border);margin-top:4px"><span>Total Promedio</span><span class="mono" style="color:var(--success)">${money(avgIncome)}</span></div>
    </div></div>
    <div class="card"><div class="card-title">Obligaciones Fijas Mensuales</div><div style="font-size:13px">
      ${state.loans.filter(l=>l.estado!=='pagado'&&l.direccion!=='otorgado').map(l=>`<div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)"><span>${l.nombre}</span><span class="mono fw-700">${money(l.cuota_mensual)}</span></div>`).join('')}
      <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)"><span>Presupuesto Hogar</span><span class="mono fw-700">${money(budgetT)}</span></div>
      <div class="flex-between" style="padding:10px 0;font-weight:700;font-size:14px;border-top:2px solid var(--border);margin-top:4px"><span>Total Obligaciones</span><span class="mono" style="color:var(--danger)">${money(oblLoans+budgetT)}</span></div>
    </div></div>
  </div>`;
}

// ============================================================
// ANALISIS
// ============================================================
function viewAnalisis() {
  const ded=calcDR(100000),cm=curMonth();
  const mtx=state.transactions.filter(t=>t.fecha?.startsWith(cm));
  const gastos=mtx.filter(t=>t.tipo==='gasto').reduce((s,t)=>s+Number(t.monto),0);
  const totalIng=state.ingresos.filter(v=>v.fecha?.startsWith(cm)).reduce((s,v)=>s+Number(v.monto),0);
  const deudaTC=state.creditCards.reduce((s,c)=>s+Number(c.saldo_actual),0);
  const deudaP=state.loans.reduce((s,l)=>s+Number(l.monto_adeudado),0);
  const limTC=state.creditCards.reduce((s,c)=>s+Number(c.monto_aprobado),0);
  const tasaUtil=pct(deudaTC,limTC);
  const tasaEnd=totalIng>0?pct(state.loans.reduce((s,l)=>s+Number(l.cuota_mensual),0),totalIng):0;
  const tasaAh=totalIng>0?pct(totalIng-gastos,totalIng):0;

  let score=100;
  if(tasaEnd>40) score-=30; else if(tasaEnd>30) score-=15;
  if(tasaUtil>50) score-=20; else if(tasaUtil>30) score-=10;
  if(tasaAh<10) score-=20; else if(tasaAh<20) score-=10;
  if(gastos>totalIng) score-=20;
  score=clamp(score,0,100);
  const hColor=score>=70?'var(--success)':score>=40?'var(--warning)':'var(--danger)';
  const hLabel=score>=70?'Saludable':score>=40?'Atención':'Riesgo';

  // Spending by category
  const byCat=state.budgetCategories.map(cat=>({...cat,spent:mtx.filter(t=>t.tipo==='gasto'&&t.categoria===cat.id).reduce((s,t)=>s+Number(t.monto),0)})).filter(c=>c.spent>0).sort((a,b)=>b.spent-a.spent);
  const maxS=byCat.length>0?byCat[0].spent:1;
  const catBars=byCat.map(c=>`<div style="margin-bottom:12px"><div class="flex-between" style="margin-bottom:4px"><span style="font-size:13px">${c.icono} ${c.nombre}</span><span class="mono fw-700" style="font-size:13px">${money(c.spent)}</span></div><div class="progress-bar" style="height:6px"><div class="progress-fill" style="width:${pct(c.spent,maxS)}%;background:var(--accent)"></div></div></div>`).join('');

  // By method
  const byMet={};mtx.filter(t=>t.tipo==='gasto').forEach(t=>{const k=t.metodo_pago||'efectivo';byMet[k]=(byMet[k]||0)+Number(t.monto);});
  const totalMet=Object.values(byMet).reduce((s,v)=>s+v,0);
  const metBars=Object.entries(byMet).map(([k,v])=>{const cc=state.creditCards.find(c=>c.id===k);const lab=k==='efectivo'?'💵 Efectivo':cc?((cc.tipo_tarjeta==='debito'?'🏧':'💳')+' '+(cc.nombre_display||cc.banco)):'💳 '+k;const p=pct(v,totalMet);return `<div style="margin-bottom:12px"><div class="flex-between" style="margin-bottom:4px"><span style="font-size:13px">${lab}</span><span style="font-size:12px"><span class="mono fw-700">${money(v)}</span> <span class="badge badge-neutral" style="margin-left:6px">${p.toFixed(0)}%</span></span></div><div class="progress-bar" style="height:6px"><div class="progress-fill" style="width:${p}%;background:${k==='efectivo'?'var(--success)':'var(--accent)'}"></div></div></div>`;}).join('');

  const gastoPct=totalIng>0?((gastos/totalIng)*100).toFixed(1):0;
  const gastoMsg=gastos/totalIng<0.7?'¡Buen control! 👏':gastos/totalIng<0.9?'Podrías optimizar un poco más.':'⚠️ Estás gastando demasiado.';

  return `<div class="page-header"><h2>Análisis Financiero</h2><p>${monthLabel(cm)} — Indicadores y métricas de salud financiera</p></div>
  <div class="card mb-6" style="text-align:center;padding:30px"><div class="card-title">Salud Financiera</div><div class="mono" style="font-size:64px;font-weight:700;color:${hColor}">${score}</div><div style="font-size:18px;font-weight:600;color:${hColor};margin-bottom:8px">${hLabel}</div><div class="progress-bar" style="height:10px;max-width:300px;margin:0 auto"><div class="progress-fill" style="width:${score}%;background:${hColor}"></div></div></div>
  <div class="grid-4 mb-6">
    <div class="stat-card"><div class="stat-label">Tasa de Endeudamiento</div><div class="stat-value ${tasaEnd>40?'negative':tasaEnd>30?'warning':'positive'}">${tasaEnd.toFixed(1)}%</div><div class="stat-sub">Cuotas / Ingresos</div></div>
    <div class="stat-card"><div class="stat-label">Utilización Crédito</div><div class="stat-value ${tasaUtil>50?'negative':tasaUtil>30?'warning':'positive'}">${tasaUtil.toFixed(1)}%</div><div class="stat-sub">Deuda TC / Límite</div></div>
    <div class="stat-card"><div class="stat-label">Tasa de Ahorro</div><div class="stat-value ${tasaAh<10?'negative':tasaAh<20?'warning':'positive'}">${tasaAh.toFixed(1)}%</div><div class="stat-sub">(Ingreso - Gasto) / Ingreso</div></div>
    <div class="stat-card"><div class="stat-label">Deuda Total</div><div class="stat-value">${money(deudaTC+deudaP)}</div><div class="stat-sub">TC + Préstamos</div></div>
  </div>
  <div class="grid-2 mb-6">
    <div class="card"><div class="card-title">Gastos por Categoría</div>${catBars.length>0?catBars:'<div class="empty-state" style="padding:20px"><p>No hay gastos este mes</p></div>'}</div>
    <div class="card"><div class="card-title">Gastos por Método de Pago</div>${metBars.length>0?metBars:'<div class="empty-state" style="padding:20px"><p>No hay datos</p></div>'}</div>
  </div>
  <div class="card"><div class="card-title">Relación Ingresos vs Gastos</div>

async function addTransaction() {
  const monto=Number($('#txMonto').value);
  if(!monto||monto<=0) return;
  const tipo=$('#txTipo').value, cat=$('#txCat').value, metodo=$('#txMetodo').value, fecha=$('#txFecha').value, desc=$('#txDesc').value;

  await db.from('transactions').insert({monto,descripcion:desc,categoria:cat,metodo_pago:metodo,tipo,fecha});

  // Update CC balance
  if(metodo!=='efectivo') {
    const cc=state.creditCards.find(c=>c.id===metodo);
    if(cc) {
      const newSaldo=tipo==='gasto'?Number(cc.saldo_actual)+monto:Math.max(0,Number(cc.saldo_actual)-monto);
      await db.from('credit_cards').update({saldo_actual:newSaldo}).eq('id',metodo);
    }
  }
  await loadAll(); render();
}

async function deleteTx(id) {
  const tx=state.transactions.find(t=>t.id===id);
  if(!tx) return;
  if(tx.metodo_pago!=='efectivo') {
    const cc=state.creditCards.find(c=>c.id===tx.metodo_pago);
    if(cc) {
      const newSaldo=tx.tipo==='gasto'?Math.max(0,Number(cc.saldo_actual)-Number(tx.monto)):Number(cc.saldo_actual)+Number(tx.monto);
      await db.from('credit_cards').update({saldo_actual:newSaldo}).eq('id',tx.metodo_pago);
    }
  }
  await db.from('transactions').delete().eq('id',id);
  await loadAll(); render();
}
