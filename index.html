<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanzasRD</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg-primary: #f8f7f4;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0eeeb;
  --bg-card: #ffffff;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-muted: #9a9a9a;
  --accent: #2d5a27;
  --accent-light: #e8f0e7;
  --accent-hover: #3d7a35;
  --danger: #c0392b;
  --danger-light: #fde8e6;
  --warning: #d4a017;
  --warning-light: #fdf6e3;
  --success: #27ae60;
  --success-light: #e8f8ef;
  --border: #e5e3df;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --font-sans: 'DM Sans', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --transition: all 0.2s ease;
}

[data-theme="dark"] {
  --bg-primary: #0f0f0f;
  --bg-secondary: #1a1a1a;
  --bg-tertiary: #222222;
  --bg-card: #1e1e1e;
  --text-primary: #e8e8e8;
  --text-secondary: #a0a0a0;
  --text-muted: #666666;
  --accent: #5cb85c;
  --accent-light: #1a2e1a;
  --accent-hover: #6fcf6f;
  --danger: #e74c3c;
  --danger-light: #2e1a1a;
  --warning: #f0c040;
  --warning-light: #2e2a1a;
  --success: #2ecc71;
  --success-light: #1a2e1f;
  --border: #333333;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font-sans); background:var(--bg-primary); color:var(--text-primary); min-height:100vh; }
.app { display:flex; flex-direction:column; min-height:100vh; }

/* ── TOPBAR ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; background:var(--bg-secondary);
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;
}
.topbar-logo { font-family:var(--font-mono); font-size:15px; font-weight:700; color:var(--accent); }
.topbar-right { display:flex; align-items:center; gap:10px; }
.hamburger {
  width:38px; height:38px; display:flex; align-items:center; justify-content:center;
  border-radius:var(--radius-sm); background:none; border:1px solid var(--border);
  cursor:pointer; font-size:18px; color:var(--text-primary); transition:var(--transition);
}
.hamburger:hover { background:var(--bg-tertiary); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg-secondary); border-top:1px solid var(--border);
  display:flex; z-index:100; padding:0 4px;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:10px 4px 8px; cursor:pointer; transition:var(--transition);
  border:none; background:none; font-family:var(--font-sans);
  color:var(--text-muted); font-size:10px; font-weight:500; gap:3px;
}
.nav-item .nav-icon { font-size:20px; line-height:1; }
.nav-item.active { color:var(--accent); }
.nav-item.active .nav-icon { transform:scale(1.1); }

/* ── SLIDE MENU ── */
.menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.2s ease; }
.menu-overlay.open { opacity:1; pointer-events:all; }
.slide-menu { position:fixed; top:0; right:0; width:260px; height:100vh; background:var(--bg-secondary); border-left:1px solid var(--border); z-index:201; transform:translateX(100%); transition:transform 0.25s ease; overflow-y:auto; display:flex; flex-direction:column; }
.slide-menu.open { transform:translateX(0); }
.menu-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
.menu-header h3 { font-size:16px; font-weight:700; }
.menu-close { width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-sm); background:none; border:none; cursor:pointer; font-size:18px; color:var(--text-secondary); }
.menu-close:hover { background:var(--bg-tertiary); }
.menu-nav { padding:12px; flex:1; }
.menu-item { display:flex; align-items:center; padding:11px 14px; border-radius:var(--radius-sm); cursor:pointer; font-size:14px; font-weight:500; color:var(--text-secondary); transition:var(--transition); }
.menu-item:hover { background:var(--bg-tertiary); color:var(--text-primary); }
.menu-footer { padding:16px; border-top:1px solid var(--border); }

/* ── MAIN ── */
.main { flex:1; padding:20px 16px 100px; max-width:700px; width:100%; margin:0 auto; }

/* ── CARDS ── */
.card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); }
.card + .card { margin-top:12px; }
.card-title { font-size:11.5px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:14px; }

/* ── STAT CARDS ── */
.stat-row { display:grid; gap:10px; margin-bottom:16px; }
.stat-row.cols-2 { grid-template-columns:1fr 1fr; }
.stat-row.cols-3 { grid-template-columns:1fr 1fr 1fr; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
.stat-label { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-muted); margin-bottom:6px; }
.stat-value { font-family:var(--font-mono); font-size:20px; font-weight:700; line-height:1.1; }
.stat-value.positive { color:var(--success); }
.stat-value.negative { color:var(--danger); }
.stat-value.warning { color:var(--warning); }
.stat-sub { font-size:11px; color:var(--text-muted); margin-top:3px; }

/* ── BUTTONS ── */
.btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:var(--radius-sm); font-family:var(--font-sans); font-size:13px; font-weight:600; border:none; cursor:pointer; transition:var(--transition); }
.btn-primary { background:var(--accent); color:white; }
.btn-primary:hover { background:var(--accent-hover); }
.btn-danger { background:var(--danger); color:white; }
.btn-ghost { background:transparent; color:var(--text-secondary); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--bg-tertiary); color:var(--text-primary); }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-full { width:100%; justify-content:center; }
.btn-icon { width:30px; height:30px; padding:0; display:inline-flex; align-items:center; justify-content:center; border-radius:var(--radius-sm); background:var(--bg-tertiary); border:1px solid var(--border); cursor:pointer; font-size:13px; transition:var(--transition); color:var(--text-secondary); }
.btn-icon:hover { background:var(--accent-light); color:var(--accent); }

/* ── FORMS ── */
.form-group { margin-bottom:12px; }
.form-label { display:block; font-size:11.5px; font-weight:600; color:var(--text-secondary); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
.form-input, .form-select {
  width:100%; padding:10px 12px; border:1px solid var(--border);
  border-radius:var(--radius-sm); font-family:var(--font-sans); font-size:14px;
  color:var(--text-primary); background:var(--bg-secondary); transition:var(--transition); outline:none;
}
.form-input:focus, .form-select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* ── QUICK ENTRY FORM ── */
.quick-form {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px; margin-bottom:16px;
}
.quick-form-toggle {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  background:none; border:none; cursor:pointer; font-family:var(--font-sans);
  padding:0; color:var(--text-primary);
}
.quick-form-body { margin-top:14px; }
.tipo-tabs { display:flex; gap:0; border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; margin-bottom:12px; }
.tipo-tab { flex:1; padding:8px; text-align:center; font-size:13px; font-weight:600; cursor:pointer; transition:var(--transition); border:none; background:transparent; font-family:var(--font-sans); color:var(--text-muted); }
.tipo-tab.active-gasto { background:var(--danger-light); color:var(--danger); }
.tipo-tab.active-ingreso { background:var(--success-light); color:var(--success); }

/* ── PROGRESS ── */
.progress-bar { width:100%; height:7px; background:var(--bg-tertiary); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width 0.4s ease; }

/* ── BADGES ── */
.badge { display:inline-flex; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-success { background:var(--success-light); color:var(--success); }
.badge-danger { background:var(--danger-light); color:var(--danger); }
.badge-warning { background:var(--warning-light); color:var(--warning); }
.badge-neutral { background:var(--bg-tertiary); color:var(--text-secondary); }

/* ── ALERTS ── */
.alert { padding:11px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.alert-warning { background:var(--warning-light); color:#856404; border:1px solid #ffc107; }
.alert-danger { background:var(--danger-light); color:var(--danger); border:1px solid var(--danger); }

/* ── TABS ── */
.tabs { display:flex; gap:2px; background:var(--bg-tertiary); padding:3px; border-radius:var(--radius-sm); margin-bottom:18px; }
.tab { flex:1; padding:7px 10px; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; color:var(--text-secondary); transition:var(--transition); border:none; background:transparent; font-family:var(--font-sans); text-align:center; }
.tab.active { background:var(--bg-card); color:var(--text-primary); font-weight:600; box-shadow:var(--shadow); }

/* ── TOGGLE ── */
.toggle { position:relative; width:42px; height:23px; background:var(--border); border-radius:12px; cursor:pointer; transition:var(--transition); flex-shrink:0; }
.toggle.on { background:var(--accent); }
.toggle::after { content:''; position:absolute; top:2px; left:2px; width:19px; height:19px; border-radius:50%; background:white; transition:var(--transition); }
.toggle.on::after { left:21px; }

/* ── TRANSACTION LIST ── */
.tx-list { display:flex; flex-direction:column; gap:0; }
.tx-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.tx-item:last-child { border-bottom:none; }
.tx-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.tx-icon.gasto { background:var(--danger-light); }
.tx-icon.ingreso { background:var(--success-light); }
.tx-body { flex:1; min-width:0; }
.tx-desc { font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-meta { font-size:11.5px; color:var(--text-muted); margin-top:1px; }
.tx-amount { font-family:var(--font-mono); font-size:14px; font-weight:700; flex-shrink:0; }
.tx-amount.gasto { color:var(--danger); }
.tx-amount.ingreso { color:var(--success); }

/* ── CC VISUAL ── */
.cc-visual {
  border-radius:var(--radius); padding:18px; color:white;
  position:relative; overflow:hidden; min-height:120px; margin-bottom:12px;
}
.cc-visual::after { content:''; position:absolute; top:-30%; right:-10%; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,0.08); }

/* ── CATEGORY BARS ── */
.cat-bar { margin-bottom:14px; }
.cat-bar-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.cat-bar-name { font-size:13px; font-weight:500; }
.cat-bar-values { font-size:12px; color:var(--text-muted); font-family:var(--font-mono); }

/* ── UPCOMING PAYMENT ROW ── */
.upcoming-item { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
.upcoming-item:last-child { border-bottom:none; }
.upcoming-name { font-size:13px; font-weight:600; }
.upcoming-when { font-size:11.5px; color:var(--text-muted); margin-top:1px; }
.upcoming-amount { font-family:var(--font-mono); font-size:14px; font-weight:700; }

/* ── SECTION HEADER ── */
.section-header { margin-bottom:18px; }
.section-header h2 { font-size:22px; font-weight:700; letter-spacing:-0.4px; }
.section-header p { font-size:13px; color:var(--text-secondary); margin-top:3px; }

/* ── UTILITY ── */
.flex { display:flex; }
.flex-between { display:flex; align-items:center; justify-content:space-between; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }
.mt-3 { margin-top:12px; }
.mt-4 { margin-top:16px; }
.mb-3 { margin-bottom:12px; }
.mb-4 { margin-bottom:16px; }
.mono { font-family:var(--font-mono); }
.fw-700 { font-weight:700; }
.text-right { text-align:right; }
.text-muted { color:var(--text-muted); }
.empty-state { text-align:center; padding:32px 20px; color:var(--text-muted); }
.empty-icon { font-size:40px; margin-bottom:10px; }
.loading { display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:12px; }
.hidden { display:none !important; }
.divider { height:1px; background:var(--border); margin:12px 0; }

/* ── AMORT TABLE ── */
.amort-table { max-height:260px; overflow-y:auto; }
.amort-table table { width:100%; border-collapse:collapse; font-size:12px; }
.amort-table th { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-muted); text-align:left; padding:8px; border-bottom:2px solid var(--border); }
.amort-table td { padding:7px 8px; border-bottom:1px solid var(--border); }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:999; padding:16px; }
.modal-box { background:var(--bg-card); border-radius:16px; padding:24px; width:100%; max-width:500px; max-height:88vh; overflow-y:auto; box-shadow:var(--shadow-md); }
.modal-title { font-size:17px; font-weight:700; margin-bottom:18px; }

/* ── LOGIN ── */
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg-primary); padding:20px; }
.login-box { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:36px; width:100%; max-width:360px; box-shadow:var(--shadow-md); }

@media(max-width:480px) {
  .stat-row.cols-3 { grid-template-columns:1fr 1fr; }
  .stat-row.cols-3 .stat-card:last-child { grid-column:1/-1; }
}

</style>
</head>
<body>
<div id="app" class="loading">
  <div style="font-size:40px">💰</div>
  <div style="color:var(--text-muted)">Conectando...</div>
</div>
<script>
// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPABASE_URL = 'https://pwpxvapwyfpepcntvzon.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3cHh2YXB3eWZwZXBjbnR2em9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjAxMTgsImV4cCI6MjA4OTg5NjExOH0.JtiQaEOnAiFmPYAqiJRqGxT-npmbHk_kCD2FirXVMS4';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let state = {
  section: 'inicio',
  subTab: '',
  theme: 'light',
  transactions: [],
  creditCards: [],
  loans: [],
  loanPayments: [],
  budgetCategories: [],
  savingsDeposits: [],
  ingresos: [],
  plantillas: [],
  user: null,
  txFormOpen: false,
  txTipo: 'gasto',
};

const MONTHS_ES   = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MONTHS_FULL = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const TIPO_LABELS = { cliente:'🎬 Cliente', proyecto:'📁 Proyecto', freelance:'💻 Freelance', otro:'💵 Otro' };

// ============================================================
// HELPERS
// ============================================================
function $(sel)   { return document.querySelector(sel); }
function $$(sel)  { return document.querySelectorAll(sel); }
function money(n) { return 'RD$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fdate(d) { if(!d) return ''; const dt=new Date(d+'T00:00:00'); return dt.getDate()+' '+MONTHS_ES[dt.getMonth()]+' '+dt.getFullYear(); }
function curMonth() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function monthLabel(ym) { const[y,m]=ym.split('-'); return MONTHS_FULL[parseInt(m)-1]+' '+y; }
function today()  { return new Date().toISOString().split('T')[0]; }
function daysUntil(day) { const d=new Date(),c=d.getDate(),dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate(); return day>c?day-c:dim-c+day; }
function getLastCutoff(cutDay)  { const n=new Date(),y=n.getFullYear(),m=n.getMonth(); return n.getDate()>=cutDay?new Date(y,m,cutDay):new Date(y,m-1,cutDay); }
function getNextCutoff(cutDay)  { const n=new Date(),y=n.getFullYear(),m=n.getMonth(); return n.getDate()<cutDay?new Date(y,m,cutDay):new Date(y,m+1,cutDay); }
function getDeadline(cutDay,dias){ const c=getLastCutoff(cutDay); const d=new Date(c); d.setDate(d.getDate()+dias); return d; }
function pct(a,b) { return b>0?(a/b*100):0; }
function clamp(v,mn,mx) { return Math.max(mn,Math.min(mx,v)); }

// ============================================================
// DATA LOADING
// ============================================================
async function loadAll() {
  const [tx,cc,lo,lp,bc,sd,st,ing,pl] = await Promise.all([
    db.from('transactions').select('*').order('fecha',{ascending:false}),
    db.from('credit_cards').select('*'),
    db.from('loans').select('*'),
    db.from('loan_payments').select('*').order('fecha',{ascending:false}),
    db.from('budget_categories').select('*').order('orden'),
    db.from('savings_deposits').select('*').order('fecha',{ascending:true}),
    db.from('settings').select('*'),
    db.from('ingresos').select('*').order('fecha',{ascending:false}),
    db.from('ingreso_plantillas').select('*').order('orden'),
  ]);
  state.transactions     = tx.data  || [];
  state.creditCards      = cc.data  || [];
  state.loans            = lo.data  || [];
  state.loanPayments     = lp.data  || [];
  state.budgetCategories = bc.data  || [];
  state.savingsDeposits  = sd.data  || [];
  state.ingresos         = ing.data || [];
  state.plantillas       = pl.data  || [];

  const themeSetting = (st.data||[]).find(s=>s.key==='theme');
  if(themeSetting) {
    const v = themeSetting.value;
    state.theme = (typeof v==='string') ? v.replace(/"/g,'') : (v||'light');
  }
  document.documentElement.setAttribute('data-theme', state.theme);
}

// ============================================================
// RENDER ENGINE
// ============================================================
function render() {
  const app = $('#app');
  app.className = 'app';
  app.innerHTML = renderTopbar() + renderMain() + renderBottomNav() + renderSlideMenu();
  bindEvents();
}

function renderTopbar() {
  const titles = { inicio:'FinanzasRD', gastos:'Gastos', cuentas:'Cuentas', prestamos:'Préstamos', resumen:'Resumen' };
  return `<header class="topbar">
    <div class="topbar-logo">${titles[state.section]||'FinanzasRD'}</div>
    <div class="topbar-right">
      <span style="font-size:11px;color:var(--text-muted)">${state.user?state.user.email.split('@')[0]:''}</span>
      <button class="hamburger" id="menuToggle">☰</button>
    </div>
  </header>`;
}

function renderBottomNav() {
  const items = [
    { id:'inicio',    icon:'🏠', label:'Inicio' },
    { id:'gastos',    icon:'📝', label:'Gastos' },
    { id:'cuentas',   icon:'💳', label:'Cuentas' },
    { id:'prestamos', icon:'🏦', label:'Préstamos' },
    { id:'resumen',   icon:'📊', label:'Resumen' },
  ];
  const btns = items.map(it=>`
    <button class="nav-item ${state.section===it.id?'active':''}" data-nav="${it.id}">
      <span class="nav-icon">${it.icon}</span>
      <span>${it.label}</span>
    </button>`).join('');
  return `<nav class="bottom-nav">${btns}</nav>`;
}

  <div class="slide-menu" id="slideMenu">

function renderMain() {
  const views = {
    inicio:    viewInicio,
    gastos:    viewGastos,
    cuentas:   viewCuentas,
    prestamos: viewPrestamos,
    resumen:   viewResumen,
  };
  const fn = views[state.section] || viewInicio;
  return `<main class="main">${fn()}</main>`;
}

function goTo(section, subTab='') {
  state.section = section;
  state.subTab  = subTab;
  render();
}

// ============================================================
// VISTA: INICIO
// ============================================================
function viewInicio() {
  const cm   = curMonth();
  const mtx  = state.transactions.filter(t=>t.fecha?.startsWith(cm));
  const gastos = mtx.filter(t=>t.tipo==='gasto').reduce((s,t)=>s+Number(t.monto),0);
  const ingMes = state.ingresos.filter(v=>v.fecha?.startsWith(cm)).reduce((s,v)=>s+Number(v.monto),0);
  const balanceNeto = ingMes - gastos;

  // Liquidez = solo tarjetas de débito
  const liquidez = state.creditCards
    .filter(c=>c.tipo_tarjeta==='debito')
    .reduce((s,c)=>s+Number(c.saldo_actual),0);

  // Deuda = solo crédito + préstamos
  const deudaTC = state.creditCards
    .filter(c=>c.tipo_tarjeta!=='debito')
    .reduce((s,c)=>s+Number(c.saldo_actual),0);
  const deudaP  = state.loans.filter(l=>l.estado!=='pagado'&&l.direccion!=='otorgado')
    .reduce((s,l)=>s+Number(l.monto_adeudado),0);

  // Presupuesto
  const fijoCats = state.budgetCategories.filter(c=>(c.tipo_gasto||'fijo')!=='periodico');
  const presTotal= fijoCats.reduce((s,c)=>s+(Number(c.presupuesto_max)||Number(c.presupuesto)||0),0);
  const presUsado= fijoCats.reduce((s,cat)=>
    s+mtx.filter(t=>t.tipo==='gasto'&&t.categoria===cat.id).reduce((ss,t)=>ss+Number(t.monto),0)
  ,0);
  const presPct  = presTotal>0 ? clamp(pct(presUsado,presTotal),0,100) : 0;
  const presColor= presUsado>presTotal?'var(--danger)':presUsado>presTotal*0.85?'var(--warning)':'var(--success)';

  // Alertas
  let alerts = '';
  const now = new Date();
  state.budgetCategories.forEach(cat=>{
    if(cat.tipo_gasto==='periodico') return;
    const ref = Number(cat.presupuesto_max)||Number(cat.presupuesto)||0;
    if(!ref) return;
    const spent = mtx.filter(t=>t.tipo==='gasto'&&t.categoria===cat.id).reduce((s,t)=>s+Number(t.monto),0);
    if(spent>=ref) alerts+=`<div class="alert alert-danger">🚨 ${cat.icono} <strong>${cat.nombre}</strong> — Presupuesto excedido (${money(spent)})</div>`;
    else if(spent>=ref*0.85) alerts+=`<div class="alert alert-warning">⚠️ ${cat.icono} <strong>${cat.nombre}</strong> — ${Math.round(pct(spent,ref))}% del presupuesto usado</div>`;
  });
  state.creditCards.filter(c=>c.tipo_tarjeta==='debito'&&c.fecha_vencimiento).forEach(c=>{
    const daysToExp=Math.ceil((new Date(c.fecha_vencimiento+'T00:00:00')-now)/(1000*60*60*24));
    if(daysToExp<=30) alerts+=`<div class="alert alert-warning">⚠️ 🏧 ${c.nombre_display}: Vence en ${daysToExp} días</div>`;
  });
  state.loans.filter(l=>l.direccion==='otorgado'&&l.estado==='activo').forEach(l=>{
    const venc=l.fecha_vencimiento||l.fecha_finalizacion;
    if(venc&&new Date(venc+'T00:00:00')<now) alerts+=`<div class="alert alert-danger">🚨 Préstamo a ${l.persona||l.nombre}: Vencido — ${money(l.monto_adeudado)}</div>`;
  });

  // Próximos pagos (15 días)
  let upcoming = [];
  state.loans.forEach(l=>{
    if(l.estado==='pagado'||l.direccion==='otorgado') return;
    if(l.dia_pago){ const d=daysUntil(l.dia_pago); if(d<=15) upcoming.push({nombre:l.nombre,monto:l.cuota_mensual,dias:d,tipo:'prestamo'}); }
  });
  state.creditCards.filter(c=>c.tipo_tarjeta!=='debito').forEach(c=>{
    const dl=getDeadline(c.fecha_corte,c.dias_limite_pago);
    const diff=Math.ceil((dl-now)/(1000*60*60*24));
    if(diff<=15&&diff>=0&&Number(c.saldo_actual)>0)
      upcoming.push({nombre:(c.nombre_display||'TC '+c.banco),monto:c.saldo_actual,dias:diff,tipo:'tc'});
  });
  upcoming.sort((a,b)=>a.dias-b.dias);

  // Top 5 categorías de gasto este mes
  const topCats = state.budgetCategories
    .map(cat=>({
      ...cat,
      spent: mtx.filter(t=>t.tipo==='gasto'&&t.categoria===cat.id).reduce((s,t)=>s+Number(t.monto),0)
    }))
    .filter(c=>c.spent>0)
    .sort((a,b)=>b.spent-a.spent)
    .slice(0,5);

  const catBars = topCats.length > 0 ? topCats.map(c=>{
    const ref  = Number(c.presupuesto_max)||Number(c.presupuesto)||0;
    const pctS = ref>0 ? clamp(pct(c.spent,ref),0,100) : 0;
    const barColor = ref>0 ? (c.spent>ref?'var(--danger)':c.spent>ref*0.85?'var(--warning)':'var(--accent)') : 'var(--accent)';
    return `<div class="cat-bar">
      <div class="cat-bar-header">
        <span class="cat-bar-name">${c.icono} ${c.nombre}</span>
        <span class="cat-bar-values">${money(c.spent)}${ref>0?' / '+money(ref):''}</span>
      </div>
      ${ref>0?`<div class="progress-bar"><div class="progress-fill" style="width:${pctS}%;background:${barColor}"></div></div>`:''}
    </div>`;
  }).join('') : `<div class="empty-state" style="padding:20px"><p>Sin gastos este mes</p></div>`;

  const upcomingHTML = upcoming.length > 0
    ? upcoming.map(p=>`<div class="upcoming-item">
        <div>
          <div class="upcoming-name">${p.nombre}</div>
          <div class="upcoming-when">${p.dias===0?'Hoy':'En '+p.dias+' día'+(p.dias===1?'':'s')}</div>
        </div>
        <div class="upcoming-amount" style="color:var(--danger)">${money(p.monto)}</div>
      </div>`).join('')
    : `<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px">✅ Sin pagos en los próximos 15 días</div>`;

  return `
  ${alerts}
  <div class="stat-row cols-2">
    <div class="stat-card">
      <div class="stat-label">💰 Liquidez</div>
      <div class="stat-value ${liquidez>=0?'positive':'negative'}">${money(liquidez)}</div>
      <div class="stat-sub">Tarjetas de débito</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📉 Gastos del Mes</div>
      <div class="stat-value negative">${money(gastos)}</div>
      <div class="stat-sub">${mtx.filter(t=>t.tipo==='gasto').length} transacciones</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📈 Ingresos del Mes</div>
      <div class="stat-value positive">${money(ingMes)}</div>
      <div class="stat-sub">${state.ingresos.filter(v=>v.fecha?.startsWith(cm)).length} registros</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🏦 Deuda Total</div>
      <div class="stat-value ${deudaTC+deudaP>0?'negative':''}">${money(deudaTC+deudaP)}</div>
      <div class="stat-sub">Crédito + Préstamos</div>
    </div>
  </div>

  ${presTotal>0?`<div class="card mb-3">
    <div class="flex-between mb-3">
      <div class="card-title" style="margin-bottom:0">Presupuesto del Mes</div>
      <span class="badge ${presUsado>presTotal?'badge-danger':presUsado>presTotal*0.85?'badge-warning':'badge-success'}">${Math.round(presPct)}%</span>
    </div>
    <div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${presPct}%;background:${presColor}"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:6px">
      <span style="font-size:12px;color:var(--text-muted)">Gastado: <strong class="mono">${money(presUsado)}</strong></span>
      <span style="font-size:12px;color:var(--text-muted)">Límite: <strong class="mono">${money(presTotal)}</strong></span>
    </div>
  </div>`:''}

  <div class="card mb-3">
    <div class="card-title">En qué se va el dinero — ${monthLabel(cm)}</div>
    ${catBars}
    ${topCats.length>0?`<button class="btn btn-ghost btn-sm mt-3" data-nav="gastos" style="width:100%;justify-content:center">Ver todas las transacciones →</button>`:''}
  </div>

  <div class="card">
    <div class="card-title">Próximos Pagos</div>
    ${upcomingHTML}
  </div>`;
}

function viewGastos() {
  const cm    = curMonth();
  const mtx   = state.transactions.filter(t=>t.fecha?.startsWith(cm));
  const filtCat = state.gatosFiltCat || '';

  // Tarjetas para el selector de método de pago
  const cardOpts = state.creditCards.map(c=>
    `<option value="${c.id}">${c.tipo_tarjeta==='debito'?'🏧':'💳'} ${c.nombre_display||c.banco}</option>`
  ).join('');
  const catOpts = state.budgetCategories.map(c=>
    `<option value="${c.id}">${c.icono} ${c.nombre}</option>`
  ).join('');
  const catFilter = [
    `<option value="">Todas las categorías</option>`,
    ...state.budgetCategories.map(c=>`<option value="${c.id}" ${filtCat===c.id?'selected':''}>${c.icono} ${c.nombre}</option>`)
  ].join('');

  // Historial filtrado
  let txList = state.transactions.filter(t=>t.fecha?.startsWith(cm));
  if(filtCat) txList = txList.filter(t=>t.categoria===filtCat);
  const txRows = txList.slice(0,60).map(t=>{
    const cat  = state.budgetCategories.find(c=>c.id===t.categoria);
    const card = t.metodo_pago==='efectivo' ? null : state.creditCards.find(c=>c.id===t.metodo_pago);
    const metodoBadge = t.metodo_pago==='efectivo'
      ? '<span class="badge badge-neutral">💵 Efectivo</span>'
      : card ? `<span class="badge badge-neutral">${card.tipo_tarjeta==='debito'?'🏧':'💳'} ${card.nombre_display||card.banco}</span>`
              : '';
    const catIcon = cat ? cat.icono : '📦';
    return `<div class="tx-item">
      <div class="tx-icon ${t.tipo}">${catIcon}</div>
      <div class="tx-body">
        <div class="tx-desc">${t.descripcion||cat?.nombre||'—'}</div>
        <div class="tx-meta">${fdate(t.fecha)} ${metodoBadge}</div>
      </div>
      <div>
        <div class="tx-amount ${t.tipo}">${t.tipo==='gasto'?'-':'+'} ${money(t.monto)}</div>
        <div style="text-align:right;margin-top:4px"><button class="btn-icon" onclick="deleteTx('${t.id}')" title="Eliminar">🗑</button></div>
      </div>
    </div>`;
  }).join('');

  const totalGastos = txList.filter(t=>t.tipo==='gasto').reduce((s,t)=>s+Number(t.monto),0);
  const totalIngresos = txList.filter(t=>t.tipo==='ingreso').reduce((s,t)=>s+Number(t.monto),0);

  return `
  <!-- FORM RÁPIDO -->
  <div class="quick-form mb-4">
    <button class="quick-form-toggle" onclick="toggleTxForm()">
      <span style="font-size:14px;font-weight:700">${state.txFormOpen?'▲':'➕'} Registrar Movimiento</span>
      <span style="font-size:12px;color:var(--text-muted)">${state.txFormOpen?'Cerrar':''}</span>
    </button>
    <div class="quick-form-body" id="txFormBody" style="${state.txFormOpen?'':'display:none'}">
      <div class="tipo-tabs">
        <button class="tipo-tab ${state.txTipo==='gasto'?'active-gasto':''}" onclick="setTxTipo('gasto')">💸 Gasto</button>
        <button class="tipo-tab ${state.txTipo==='ingreso'?'active-ingreso':''}" onclick="setTxTipo('ingreso')">💵 Ingreso</button>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Monto (RD$)</label>
          <input class="form-input" type="number" id="txMonto" placeholder="0.00" style="font-size:18px;font-weight:700" autofocus>
        </div>
        <div class="form-group" id="txCatGroup" style="${state.txTipo==='ingreso'?'display:none':''}">
          <label class="form-label">Categoría</label>
          <select class="form-select" id="txCat">${catOpts}</select>
        </div>
        <div class="form-group" id="txTipoIngGrp" style="${state.txTipo==='gasto'?'display:none':''}">
          <label class="form-label">Tipo de Ingreso</label>
          <select class="form-select" id="txTipoIng">
            <option value="cliente">🎬 Cliente</option>
            <option value="proyecto">📁 Proyecto</option>
            <option value="freelance">💻 Freelance</option>
            <option value="otro">💵 Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">${state.txTipo==='gasto'?'Método de Pago':'Destino'}</label>
          <select class="form-select" id="txMetodo">
            <option value="efectivo">💵 Efectivo</option>
            ${cardOpts}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input class="form-input" type="date" id="txFecha" value="${today()}">
        </div>
        <div class="form-group">
          <label class="form-label">Descripción (opcional)</label>
          <input class="form-input" id="txDesc" placeholder="Nota rápida...">
        </div>
      </div>
      <div class="flex gap-2 mt-3">
        <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="addMovimiento()">
          ${state.txTipo==='gasto'?'💸 Registrar Gasto':'💵 Registrar Ingreso'}
        </button>
      </div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="card">
    <div class="flex-between mb-3">
      <div class="card-title" style="margin-bottom:0">Movimientos — ${monthLabel(cm)}</div>
      <div class="mono" style="font-size:12px;color:var(--text-muted)">${txList.length} registros</div>
    </div>
    <div class="form-group mb-3">
      <select class="form-select" id="filtCat" onchange="filterByCat(this.value)" style="font-size:13px;padding:7px 10px">
        ${catFilter}
      </select>
    </div>
    ${totalGastos>0||totalIngresos>0?`<div class="flex-between mb-3" style="padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)">
      <div style="font-size:13px"><span style="color:var(--danger)">Gastos: <strong class="mono">${money(totalGastos)}</strong></span></div>
      ${totalIngresos>0?`<div style="font-size:13px"><span style="color:var(--success)">Ingresos: <strong class="mono">${money(totalIngresos)}</strong></span></div>`:''}
    </div>`:''}
    <div class="tx-list">
      ${txRows.length>0 ? txRows : '<div class="empty-state"><div class="empty-icon">📭</div><p>Sin movimientos este mes</p></div>'}
    </div>
  </div>`;
}

// VISTA: CUENTAS (tarjetas + ahorros en tabs)
// ============================================================
function viewCuentas() {
  if(!state.subTab || state.subTab==='tarjetas') state.subTab='tarjetas';
  return `
  <div class="tabs">
    <button class="tab ${state.subTab==='tarjetas'?'active':''}" onclick="state.subTab='tarjetas';render()">💳 Tarjetas</button>
    <button class="tab ${state.subTab==='ahorros'?'active':''}" onclick="state.subTab='ahorros';render()">🐷 Fondo</button>
  </div>
  ${state.subTab==='tarjetas' ? renderTarjetas() : renderAhorros()}`;
}

function renderTarjetas() {
  const now      = new Date();
  const debitos  = state.creditCards.filter(c=>c.tipo_tarjeta==='debito');
  const creditos = state.creditCards.filter(c=>c.tipo_tarjeta!=='debito');
  const colors   = ['#2d5a27','#1a3a6b','#8b0000','#4a4a4a','#1a1a1a','#6b3fa0','#c0392b','#2980b9','#d4a017','#16a085','#e67e22','#7f8c8d'];
  const colorPicker = id => colors.map(c=>
    `<div onclick="document.getElementById('${id}').value='${c}';document.getElementById('${id}Prev').style.background='${c}'" 
     style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;border:2px solid var(--border)"></div>`
  ).join('');

  function renderCard(cc) {
    const isCredit = cc.tipo_tarjeta !== 'debito';
    const cardColor= cc.color || '#2d5a27';
    const util     = isCredit ? pct(Number(cc.saldo_actual),Number(cc.monto_aprobado)) : 0;
    const disp     = Number(cc.monto_aprobado) - Number(cc.saldo_actual);
    const displayName = cc.nombre_display || ('Banco '+cc.banco);

    let extraInfo = '';
    if(isCredit) {
      const nextCorte = getNextCutoff(cc.fecha_corte);
      const dl        = getDeadline(cc.fecha_corte, cc.dias_limite_pago);
      const diasP     = Math.ceil((dl-now)/(1000*60*60*24));
      extraInfo = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
          <div><div class="stat-label">Disponible</div><div class="mono fw-700" style="color:${disp>0?'var(--success)':'var(--danger)'}">${money(disp)}</div></div>
          <div><div class="stat-label">Límite</div><div class="mono fw-700">${money(cc.monto_aprobado)}</div></div>
          <div><div class="stat-label">Próx. Corte</div><div style="font-size:13px;font-weight:600">${nextCorte.getDate()} ${MONTHS_ES[nextCorte.getMonth()]}</div></div>
          <div><div class="stat-label">Pagar antes del</div><div style="font-size:13px;font-weight:600">${dl.getDate()} ${MONTHS_ES[dl.getMonth()]} <span class="badge ${diasP<=0?'badge-danger':diasP<=5?'badge-danger':diasP<=10?'badge-warning':'badge-success'}">${diasP<=0?'Vencido':diasP+' días'}</span></div></div>
        </div>`;
    } else {
      if(cc.fecha_vencimiento) {
        const daysToExp = Math.ceil((new Date(cc.fecha_vencimiento+'T00:00:00')-now)/(1000*60*60*24));
        const vMM = cc.fecha_vencimiento.substring(5,7);
        const vYY = cc.fecha_vencimiento.substring(0,4);
        extraInfo = `<div style="margin-top:10px"><div class="stat-label">Vencimiento</div><div style="font-size:13px;font-weight:600">${vMM}/${vYY} <span class="badge ${daysToExp<=30?'badge-danger':daysToExp<=90?'badge-warning':'badge-neutral'}">${daysToExp>0?daysToExp+' días':'Vencida'}</span></div></div>`;
      }
    }

    return `<div class="card mb-3">
      <div class="cc-visual" style="background:linear-gradient(135deg,${cardColor},${cardColor}88)">
        <div class="flex-between">
          <div style="font-size:15px;font-weight:700">${displayName}</div>
          <span style="font-size:11px;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:10px">${isCredit?'💳 Crédito':'🏧 Débito'}</span>
        </div>
        <div style="font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:1px;margin-top:10px">${isCredit?'Saldo Actual':'Saldo Disponible'}</div>
        <div class="mono" style="font-size:22px;font-weight:700;margin-top:4px">${money(cc.saldo_actual)}</div>
        ${isCredit?`<div style="margin-top:10px;height:5px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${clamp(util,0,100)}%;background:${util>80?'#e74c3c':util>50?'#f0c040':'#2ecc71'}"></div></div><div style="font-size:11px;opacity:0.7;margin-top:4px">${util.toFixed(0)}% utilizado</div>`:''}
      </div>
      ${extraInfo}
      <div style="background:var(--bg-tertiary);border-radius:var(--radius-sm);padding:10px;margin-top:12px">
        <div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">⚡ Ajustar Saldo</div>
        <div class="flex gap-2">
          <input class="form-input" type="number" placeholder="Saldo real..." id="adj-${cc.id}" style="flex:1;padding:7px 10px;font-size:13px">
          <button class="btn btn-primary btn-sm" onclick="adjustCardBalance('${cc.id}')">OK</button>
        </div>
      </div>
      <div class="flex gap-2 mt-3">
        <button class="btn btn-ghost btn-sm" onclick="showEditCard('${cc.id}')">✏️ Editar</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteCard('${cc.id}')">🗑 Eliminar</button>
      </div>

    <div class="card-title">Nueva Tarjeta</div>

      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Color</label><div class="flex gap-2" style="flex-wrap:wrap;margin-bottom:6px">${colorPicker('ncColor')}</div><input type="hidden" id="ncColor" value="#2d5a27"><div id="ncColorPrev" style="width:100%;height:6px;border-radius:3px;background:#2d5a27"></div></div>

    </div>

  return `

  <div class="flex-between mb-3">
    <div></div>
    <button class="btn btn-primary btn-sm" onclick="$('#newCardForm').style.display='block'">➕ Nueva Tarjeta</button>

  ${debitos.length>0?`<div class="card-title mb-3">🏧 Tarjetas de Débito</div>${debitos.map(renderCard).join('')}`:''}
  ${creditos.length>0?`<div class="card-title mb-3 mt-4">💳 Tarjetas de Crédito</div>${creditos.map(renderCard).join('')}`:''}

}

function renderAhorros() {
  const balance = state.savingsDeposits.reduce((s,d)=>s+Number(d.monto),0);

    running += Number(d.monto);
    return `<div class="tx-item">

function viewPrestamos() {
  const now      = new Date();
  const tomados  = state.loans.filter(l=>l.direccion!=='otorgado');
  const otorgados= state.loans.filter(l=>l.direccion==='otorgado');

  function renderLoan(loan) {
    const isOtorgado = loan.direccion==='otorgado';
    const payments   = state.loanPayments.filter(p=>p.loan_id===loan.id);
    const montoBase  = Number(loan.monto_original||loan.monto_adeudado);
    const progress   = montoBase>0 ? pct(montoBase-Number(loan.monto_adeudado),montoBase) : 0;
    const diasP      = loan.dia_pago ? daysUntil(loan.dia_pago) : null;
    const colorAccent= isOtorgado ? 'var(--accent)' : 'var(--danger)';

    let estadoBadge='';

    else if(loan.estado==='mora') estadoBadge='<span class="badge badge-danger">⚠️ En Mora</span>';
    else {
      const venc=loan.fecha_vencimiento||loan.fecha_finalizacion;

    return `<div class="card mb-3" style="border-left:4px solid ${colorAccent}">
      <div class="flex-between mb-3">
        <div>
          <div style="font-size:16px;font-weight:700;margin-bottom:4px">${loan.nombre} ${estadoBadge}</div>
          ${loan.persona?`<div style="font-size:12px;color:var(--text-muted)">👤 ${loan.persona}</div>`:''}

        </div>
        <div style="text-align:right">
          <div class="stat-label">${isOtorgado?'Te deben':'Adeudado'}</div>
          <div class="mono" style="font-size:20px;font-weight:700;color:${colorAccent}">${money(loan.monto_adeudado)}</div>

      <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">${progress.toFixed(1)}% ${isOtorgado?'cobrado':'pagado'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">

        <div><div class="stat-label">Tasa</div><div class="fw-700">${Number(loan.tasa)>0?loan.tasa+'%':'—'}</div></div>

        <div><div class="stat-label">Pagos</div><div class="fw-700">${payments.length}</div></div>
      </div>
      ${loan.estado!=='pagado'?`<div class="flex gap-2" style="flex-wrap:wrap">
        ${!loan.pago_unico&&loan.cuota_mensual?`<button class="btn btn-primary btn-sm" onclick="payLoan('${loan.id}')">${isOtorgado?'💰 Abono':'✅ Pagar'} ${money(loan.cuota_mensual)}</button>`:''}

          <input class="form-input" type="number" placeholder="Monto extra" id="extra-${loan.id}" style="width:120px;padding:6px 8px">
          <button class="btn btn-ghost btn-sm" onclick="payLoanExtra('${loan.id}')">Extra</button>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="markLoanStatus('${loan.id}','pagado')">✅ Saldado</button>
      </div>`:''}

        <button class="btn btn-ghost btn-sm" onclick="editLoan('${loan.id}')">✏️ Editar</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteLoan('${loan.id}')">🗑 Eliminar</button>
      </div>
      ${payments.length>0?`<div class="divider"></div><div class="stat-label">Últimos pagos</div>${payments.slice(0,3).map(p=>`<div class="flex-between" style="padding:5px 0"><span class="mono" style="font-size:12px">${fdate(p.fecha)}</span><span class="mono fw-700" style="font-size:12px;color:var(--success)">${money(p.monto)}</span></div>`).join('')}`:''}
    </div>`;
  }

  const newLoanForm = `<div class="card mb-3" id="newLoanForm" style="display:none">
    <div class="card-title">Nuevo Préstamo</div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Dirección</label><select class="form-select" id="nlDir" onchange="toggleLoanFields()"><option value="tomado">📥 Yo debo</option><option value="otorgado">📤 Me deben</option></select></div>
      <div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="nlNombre" placeholder="Ej: Préstamo carro..."></div>
      <div class="form-group" id="nlPersonaGrp" style="display:none"><label class="form-label">Persona</label><input class="form-input" id="nlPersona" placeholder="Nombre"></div>
      <div class="form-group" id="nlContactoGrp" style="display:none"><label class="form-label">Contacto</label><input class="form-input" id="nlContacto" placeholder="Teléfono..."></div>
      <div class="form-group"><label class="form-label">Monto Total</label><input class="form-input" type="number" id="nlMonto" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Monto Adeudado</label><input class="form-input" type="number" id="nlAdeudado" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Tipo de Pago</label><select class="form-select" id="nlPagoTipo" onchange="toggleCuotaField()"><option value="cuotas">Cuotas mensuales</option><option value="unico">Pago único</option></select></div>
      <div class="form-group" id="nlCuotaGrp"><label class="form-label">Cuota Mensual</label><input class="form-input" type="number" id="nlCuota" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Tasa de Interés (%)</label><input class="form-input" type="number" id="nlTasa" placeholder="0" value="0"></div>
      <div class="form-group" id="nlDiaGrp"><label class="form-label">Día de Pago</label><input class="form-input" type="number" id="nlDia" placeholder="1-31" min="1" max="31"></div>
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Fecha de Vencimiento</label><input class="form-input" type="date" id="nlVenc"></div>
    </div>
    <div class="flex gap-2 mt-3">
      <button class="btn btn-primary" onclick="saveNewLoan()">💾 Guardar</button>
      <button class="btn btn-ghost" onclick="$('#newLoanForm').style.display='none'">Cancelar</button>
    </div>
  </div>`;

  return `
  <div class="stat-row cols-2">
    <div class="stat-card"><div class="stat-label">Lo que Debes</div><div class="stat-value negative">${money(totalDebes)}</div><div class="stat-sub">${tomados.filter(l=>l.estado!=='pagado').length} activos</div></div>
    <div class="stat-card"><div class="stat-label">Lo que te Deben</div><div class="stat-value positive">${money(totalTeDeben)}</div><div class="stat-sub">${otorgados.filter(l=>l.estado!=='pagado').length} activos</div></div>
  </div>
  <div class="flex-between mb-3"><div></div><button class="btn btn-primary btn-sm" onclick="$('#newLoanForm').style.display='block'">➕ Nuevo Préstamo</button></div>

function viewResumen() {
  if(!state.subTab||!['presupuesto','analisis','proyeccion'].includes(state.subTab)) state.subTab='presupuesto';
  return `
  <div class="tabs">
    <button class="tab ${state.subTab==='presupuesto'?'active':''}" onclick="state.subTab='presupuesto';render()">📋 Presupuesto</button>
    <button class="tab ${state.subTab==='analisis'?'active':''}" onclick="state.subTab='analisis';render()">📊 Análisis</button>
    <button class="tab ${state.subTab==='proyeccion'?'active':''}" onclick="state.subTab='proyeccion';render()">📈 Proyección</button>
  </div>
  ${state.subTab==='presupuesto' ? renderPresupuesto() : state.subTab==='analisis' ? renderAnalisis() : renderProyeccion()}`;
}

function renderPresupuesto() {
  const cm  = curMonth();
  const mtx = state.transactions.filter(t=>t.fecha?.startsWith(cm)&&t.tipo==='gasto');
  const fijos     = state.budgetCategories.filter(c=>(c.tipo_gasto||'fijo')==='fijo');
  const periodicos= state.budgetCategories.filter(c=>c.tipo_gasto==='periodico');
  const allGastoTx= state.transactions.filter(t=>t.tipo==='gasto');
  const totalP    = fijos.reduce((s,c)=>s+(Number(c.presupuesto_max)||Number(c.presupuesto)||0),0);
  const totalG    = fijos.reduce((s,c)=>s+mtx.filter(t=>t.categoria===c.id).reduce((ss,t)=>ss+Number(t.monto),0),0);

  const fijoRows = fijos.map(cat=>{
    const spent  = mtx.filter(t=>t.categoria===cat.id).reduce((s,t)=>s+Number(t.monto),0);
    const bMin   = Number(cat.presupuesto_min)||0;
    const bMax   = Number(cat.presupuesto_max)||Number(cat.presupuesto)||0;
    const ref    = bMax||bMin;
    const rem    = ref-spent;
    const p      = ref>0?pct(spent,ref):0;
    const st     = p>100?'danger':p>85?'warning':'success';
    return `<div class="cat-bar" data-cat="${cat.id}" style="padding:12px;border-bottom:1px solid var(--border)">
      <div class="flex-between mb-2">
        <span style="font-size:14px;font-weight:600">${cat.icono} ${cat.nombre}</span>
        <span class="badge badge-${st}">${p>100?'+'+Math.round(p-100)+'%':Math.round(p)+'%'}</span>
      </div>
      <div class="grid-2" style="gap:6px;margin-bottom:6px">
        <input class="form-input bud-max" type="number" value="${bMax||''}" onchange="updateBudgetRange('${cat.id}','max',this.value)" placeholder="Presupuesto" style="padding:6px 8px;font-size:12px" title="Presupuesto máximo">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="mono" style="font-size:13px;font-weight:700;color:var(--danger)">-${money(spent)}</span>
          <span class="mono td-rem" style="font-size:12px;color:${rem>=0?'var(--success)':'var(--danger)'}">= ${money(rem)}</span>
        </div>
      </div>
      ${ref>0?`<div class="progress-bar"><div class="progress-fill td-bar" style="width:${clamp(p,0,100)}%;background:var(--${st})"></div></div>`:''}
      <div class="flex gap-2 mt-2">
        <button class="btn-icon" title="Convertir a periódico" onclick="convertCat('${cat.id}','periodico')">🔄</button>
        <button class="btn-icon" style="color:var(--danger)" title="Eliminar" onclick="deleteCat('${cat.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');

  const periodicoRows = periodicos.map(cat=>{
    const catTx   = allGastoTx.filter(t=>t.categoria===cat.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
    const lastTx  = catTx.length>0?catTx[0]:null;
    const lastDate= lastTx?new Date(lastTx.fecha+'T00:00:00'):null;
    const now     = new Date();
    const daysSince=lastDate?Math.floor((now-lastDate)/(1000*60*60*24)):null;
    let avgDays=null;
    if(catTx.length>=2){let td=0;for(let i=0;i<Math.min(catTx.length-1,10);i++){const d1=new Date(catTx[i].fecha+'T00:00:00');const d2=new Date(catTx[i+1].fecha+'T00:00:00');td+=Math.abs((d1-d2)/(1000*60*60*24));}avgDays=Math.round(td/Math.min(catTx.length-1,10));}
    const montoEst = Number(cat.monto_total)||0;
    const isOverdue= avgDays&&daysSince&&daysSince>avgDays;
    return `<div class="card mb-3" style="border-left:3px solid ${isOverdue?'var(--warning)':'var(--border)'}">
      <div class="flex-between mb-2">
        <span style="font-size:14px;font-weight:700">${cat.icono} ${cat.nombre}</span>
        <div class="flex gap-2">
          <button class="btn-icon" onclick="convertCat('${cat.id}','fijo')">🔄</button>
          <button class="btn-icon" style="color:var(--danger)" onclick="deleteCat('${cat.id}')">🗑</button>
        </div>
      </div>
      <div class="grid-2" style="gap:8px">
        <div><div class="stat-label">Monto Estimado</div><input class="form-input" type="number" value="${montoEst||''}" onchange="updatePeriodicMonto('${cat.id}',this.value)" placeholder="0.00" style="padding:6px 8px;font-size:13px"></div>
        <div><div class="stat-label">Último Gasto</div><div style="font-size:13px;font-weight:600">${lastTx?fdate(lastTx.fecha):'Sin registro'}</div>${daysSince!==null?`<div style="font-size:11px;color:${isOverdue?'var(--warning)':'var(--text-muted)'}">Hace ${daysSince} días${isOverdue?' ⚠️':''}</div>`:''}</div>
      </div>
    </div>`;
  }).join('');

  const newCatForm = `<div class="card mb-3" id="newCatForm" style="display:none">
    <div class="card-title">Nueva Categoría</div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Emoji</label><input class="form-input" id="ncEmoji" placeholder="📦" maxlength="4" style="width:70px;font-size:20px;text-align:center"></div>
      <div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="ncNombre" placeholder="Nombre..."></div>
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Tipo</label><select class="form-select" id="ncTipoGasto"><option value="fijo">📅 Gasto Fijo Mensual</option><option value="periodico">🔁 Gasto Periódico</option></select></div>
    </div>
    <div class="flex gap-2 mt-3">
      <button class="btn btn-primary" onclick="saveNewCategory()">💾 Guardar</button>
      <button class="btn btn-ghost" onclick="$('#newCatForm').style.display='none'">Cancelar</button>
    </div>
  </div>`;

  return `
  <div class="stat-row cols-3 mb-3">
    <div class="stat-card"><div class="stat-label">Presupuesto</div><div class="stat-value">${money(totalP)}</div></div>
    <div class="stat-card"><div class="stat-label">Gastado</div><div class="stat-value negative">${money(totalG)}</div></div>
    <div class="stat-card"><div class="stat-label">Remanente</div><div class="stat-value ${totalP-totalG>=0?'positive':'negative'}">${money(totalP-totalG)}</div></div>
  </div>
  <div class="flex-between mb-3"><div></div><button class="btn btn-primary btn-sm" onclick="$('#newCatForm').style.display='block'">➕ Nueva Categoría</button></div>
  ${newCatForm}
  ${fijos.length>0?`<div class="card mb-3"><div class="card-title">📅 Gastos Fijos Mensuales</div>${fijoRows}</div>`:''}
  ${periodicos.length>0?`<div class="card-title mb-3">🔁 Gastos Periódicos</div>${periodicoRows}`:''}`;
}

function renderAnalisis() {
  const cm      = curMonth();
  const mtx     = state.transactions.filter(t=>t.fecha?.startsWith(cm));
  const gastos  = mtx.filter(t=>t.tipo==='gasto').reduce((s,t)=>s+Number(t.monto),0);
  const totalIng= state.ingresos.filter(v=>v.fecha?.startsWith(cm)).reduce((s,v)=>s+Number(v.monto),0);
  const deudaTC = state.creditCards.filter(c=>c.tipo_tarjeta!=='debito').reduce((s,c)=>s+Number(c.saldo_actual),0);
  const limTC   = state.creditCards.filter(c=>c.tipo_tarjeta!=='debito').reduce((s,c)=>s+Number(c.monto_aprobado),0);
  const deudaP  = state.loans.filter(l=>l.estado!=='pagado'&&l.direccion!=='otorgado').reduce((s,l)=>s+Number(l.monto_adeudado),0);
  const tasaUtil= pct(deudaTC,limTC);
  const cuotasTotal = state.loans.filter(l=>l.estado!=='pagado'&&l.direccion!=='otorgado').reduce((s,l)=>s+Number(l.cuota_mensual),0);
  const tasaEnd = totalIng>0?pct(cuotasTotal,totalIng):0;
  const tasaAh  = totalIng>0?pct(totalIng-gastos,totalIng):0;

  let score=100;
  if(tasaEnd>40) score-=30; else if(tasaEnd>30) score-=15;
  if(tasaUtil>50) score-=20; else if(tasaUtil>30) score-=10;
  if(tasaAh<10) score-=20; else if(tasaAh<20) score-=10;
  if(gastos>totalIng) score-=20;
  score=clamp(score,0,100);
  const hColor = score>=70?'var(--success)':score>=40?'var(--warning)':'var(--danger)';
  const hLabel = score>=70?'Saludable':score>=40?'Atención':'Riesgo';

  // Gastos por categoría
  const byCat = state.budgetCategories
    .map(cat=>({...cat, spent:mtx.filter(t=>t.tipo==='gasto'&&t.categoria===cat.id).reduce((s,t)=>s+Number(t.monto),0)}))
    .filter(c=>c.spent>0).sort((a,b)=>b.spent-a.spent);
  const maxS = byCat.length>0?byCat[0].spent:1;
  const catBars = byCat.map(c=>`<div class="cat-bar">
    <div class="cat-bar-header">
      <span class="cat-bar-name">${c.icono} ${c.nombre}</span>
      <span class="cat-bar-values">${money(c.spent)} (${pct(c.spent,gastos).toFixed(0)}%)</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct(c.spent,maxS)}%;background:var(--accent)"></div></div>
  </div>`).join('');

  // Gastos por método
  const byMet={};
  mtx.filter(t=>t.tipo==='gasto').forEach(t=>{const k=t.metodo_pago||'efectivo';byMet[k]=(byMet[k]||0)+Number(t.monto);});
  const metTotal=Object.values(byMet).reduce((s,v)=>s+v,0);
  const metRows=Object.entries(byMet).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
    const cc=state.creditCards.find(c=>c.id===k);
    const lab=k==='efectivo'?'💵 Efectivo':cc?((cc.tipo_tarjeta==='debito'?'🏧':'💳')+' '+(cc.nombre_display||cc.banco)):'💳';
    const p=pct(v,metTotal);
    return `<div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px">${lab}</span>
      <span class="mono fw-700" style="font-size:13px">${money(v)} <span class="badge badge-neutral">${p.toFixed(0)}%</span></span>
    </div>`;
  }).join('');

  // Ingresos por tipo este mes
  const ingMes = state.ingresos.filter(v=>v.fecha?.startsWith(cm));
  const byTipoIng={};
  ingMes.forEach(v=>{const k=v.tipo_fuente||'otro';byTipoIng[k]=(byTipoIng[k]||0)+Number(v.monto);});
  const ingRows = Object.entries(byTipoIng).map(([k,v])=>`<div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)">
    <span style="font-size:13px">${TIPO_LABELS[k]||k}</span>
    <span class="mono fw-700">${money(v)}</span>
  </div>`).join('');

  return `
  <div class="card mb-3" style="text-align:center;padding:24px">
    <div class="card-title">Salud Financiera</div>
    <div class="mono" style="font-size:56px;font-weight:700;color:${hColor}">${score}</div>
    <div style="font-size:16px;font-weight:600;color:${hColor};margin-bottom:10px">${hLabel}</div>
    <div class="progress-bar" style="height:8px;max-width:260px;margin:0 auto"><div class="progress-fill" style="width:${score}%;background:${hColor}"></div></div>
  </div>
  <div class="stat-row cols-2 mb-3">
    <div class="stat-card"><div class="stat-label">Endeudamiento</div><div class="stat-value ${tasaEnd>40?'negative':tasaEnd>30?'warning':'positive'}">${tasaEnd.toFixed(1)}%</div><div class="stat-sub">Cuotas / Ingresos</div></div>
    <div class="stat-card"><div class="stat-label">Uso de Crédito</div><div class="stat-value ${tasaUtil>50?'negative':tasaUtil>30?'warning':'positive'}">${tasaUtil.toFixed(1)}%</div><div class="stat-sub">Deuda / Límite</div></div>
    <div class="stat-card"><div class="stat-label">Tasa de Ahorro</div><div class="stat-value ${tasaAh<10?'negative':tasaAh<20?'warning':'positive'}">${tasaAh.toFixed(1)}%</div><div class="stat-sub">(Ing - Gasto) / Ing</div></div>
    <div class="stat-card"><div class="stat-label">Deuda Total</div><div class="stat-value">${money(deudaTC+deudaP)}</div><div class="stat-sub">Crédito + Préstamos</div></div>
  </div>
  <div class="card mb-3"><div class="card-title">Gastos por Categoría</div>${catBars||'<div class="empty-state" style="padding:16px"><p>Sin gastos este mes</p></div>'}</div>
  <div class="card mb-3"><div class="card-title">Gastos por Método de Pago</div>${metRows||'<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Sin datos</div>'}</div>
  ${ingRows?`<div class="card"><div class="card-title">Ingresos por Tipo</div>${ingRows}<div class="flex-between" style="padding:8px 0;font-weight:700;border-top:2px solid var(--border);margin-top:4px"><span>Total</span><span class="mono" style="color:var(--success)">${money(totalIng)}</span></div></div>`:''}`;
}

function renderProyeccion() {
  const last3=[];
  for(let i=2;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);last3.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));}
  const last3Inc = state.ingresos.filter(v=>last3.some(m=>v.fecha?.startsWith(m)));
  const avgIncome= last3Inc.reduce((s,v)=>s+Number(v.monto),0)/3;

  const byTipo={};
  last3Inc.forEach(v=>{const k=v.tipo_fuente||'otro';byTipo[k]=(byTipo[k]||0)+Number(v.monto);});
  Object.keys(byTipo).forEach(k=>byTipo[k]=byTipo[k]/3);

  const oblLoans = state.loans.filter(l=>l.estado!=='pagado'&&l.direccion!=='otorgado').reduce((s,l)=>s+Number(l.cuota_mensual),0);
  const fijoCats = state.budgetCategories.filter(c=>(c.tipo_gasto||'fijo')!=='periodico');
  const budgetT  = fijoCats.reduce((s,c)=>s+(Number(c.presupuesto_max)||Number(c.presupuesto)||0),0);

  const projs=[30,60,90].map(days=>{
    const m=days/30;
    const ing=avgIncome*m;
    const obl=(oblLoans+budgetT)*m;
    return {days,ing,obl,net:ing-obl};
  });

  const incBreakdown = Object.entries(byTipo).map(([k,v])=>
    `<div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${TIPO_LABELS[k]||k}</span><span class="mono fw-700">${money(v)}/mes</span></div>`
  ).join('');

  const loanRows = state.loans.filter(l=>l.estado!=='pagado'&&l.direccion!=='otorgado').map(l=>
    `<div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${l.nombre}</span><span class="mono fw-700">${money(l.cuota_mensual)}</span></div>`
  ).join('');

  const last6=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');const total=state.ingresos.filter(v=>v.fecha?.startsWith(ym)).reduce((s,v)=>s+Number(v.monto),0);last6.push({month:MONTHS_ES[d.getMonth()],total});}
  const maxI=Math.max(...last6.map(m=>m.total),1);
  const chartBars=last6.map(m=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
    <div style="font-size:9px;color:var(--text-muted);margin-bottom:3px">${m.total>0?Math.round(m.total/1000)+'K':''}</div>
    <div style="width:70%;max-width:28px;height:${Math.max(2,(m.total/maxI)*110)}px;background:var(--accent);border-radius:3px 3px 0 0"></div>
    <div style="font-size:10px;color:var(--text-muted);margin-top:5px">${m.month}</div>
  </div>`).join('');

  return `
  <div class="stat-row cols-3 mb-3">${projs.map(p=>`<div class="stat-card">
    <div class="stat-label">${p.days} Días</div>
    <div class="mono fw-700" style="font-size:16px;color:${p.net>=0?'var(--success)':'var(--danger)'}">${money(p.net)}</div>
    <div class="stat-sub" style="color:var(--success);font-size:10px">↑${money(p.ing)}</div>
    <div class="stat-sub" style="color:var(--danger);font-size:10px">↓${money(p.obl)}</div>
  </div>`).join('')}</div>
  <div class="card mb-3">
    <div class="card-title">Ingresos Últimos 6 Meses</div>
    <div style="display:flex;align-items:flex-end;gap:4px;height:130px;padding:0 4px">${chartBars}</div>
  </div>
  <div class="card mb-3"><div class="card-title">Promedio Mensual de Ingresos (3m)</div>
    ${incBreakdown||'<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Sin datos suficientes</div>'}
    <div class="flex-between" style="padding:8px 0;font-weight:700;font-size:14px;border-top:2px solid var(--border);margin-top:4px"><span>Total Promedio</span><span class="mono" style="color:var(--success)">${money(avgIncome)}</span></div>
  </div>
  <div class="card"><div class="card-title">Obligaciones Fijas Mensuales</div>
    ${loanRows}
    <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">Presupuesto Hogar</span><span class="mono fw-700">${money(budgetT)}</span></div>
    <div class="flex-between" style="padding:8px 0;font-weight:700;font-size:14px;border-top:2px solid var(--border);margin-top:4px"><span>Total Obligaciones</span><span class="mono" style="color:var(--danger)">${money(oblLoans+budgetT)}</span></div>
  </div>`;
}

async function addMovimiento() {
  const monto  = Number($('#txMonto').value);
  if(!monto||monto<=0) return;
  const tipo   = state.txTipo;
  const metodo = $('#txMetodo').value;
  const fecha  = $('#txFecha').value;
  const desc   = $('#txDesc').value.trim();

  if(tipo==='gasto') {
    const cat = $('#txCat').value;
    await db.from('transactions').insert({monto,descripcion:desc,categoria:cat,metodo_pago:metodo,tipo:'gasto',fecha});
    // Update card balance
    if(metodo!=='efectivo') {
      const cc = state.creditCards.find(c=>c.id===metodo);
      if(cc) {
        const newSaldo = Number(cc.saldo_actual)+monto; // credit: increases debt; debit: balance goes down
        const isDebit  = cc.tipo_tarjeta==='debito';
        await db.from('credit_cards').update({saldo_actual: isDebit ? Math.max(0,Number(cc.saldo_actual)-monto) : newSaldo}).eq('id',metodo);
      }
    }
  } else {
    // Ingreso
    const tipo_fuente = $('#txTipoIng').value;
    const fuente      = desc || tipo_fuente;
    await db.from('ingresos').insert({monto,fuente,tipo_fuente,destino:metodo,fecha,nota:null});
    // Update debit card balance
    if(metodo!=='efectivo') {
      const cc = state.creditCards.find(c=>c.id===metodo);
      if(cc && cc.tipo_tarjeta==='debito') {
        await db.from('credit_cards').update({saldo_actual:Number(cc.saldo_actual)+monto}).eq('id',metodo);
      }
    }
  }
  // Reset form
  $('#txMonto').value='';
  $('#txDesc').value='';
  await loadAll(); render();
}

async function deleteTx(id) {
  const tx = state.transactions.find(t=>t.id===id);
  if(!tx) return;
  if(tx.metodo_pago!=='efectivo') {
    const cc = state.creditCards.find(c=>c.id===tx.metodo_pago);
    if(cc) {
      const isDebit = cc.tipo_tarjeta==='debito';
      let newSaldo;
      if(isDebit) {
        newSaldo = tx.tipo==='gasto' ? Number(cc.saldo_actual)+Number(tx.monto) : Math.max(0,Number(cc.saldo_actual)-Number(tx.monto));
      } else {
        newSaldo = tx.tipo==='gasto' ? Math.max(0,Number(cc.saldo_actual)-Number(tx.monto)) : Number(cc.saldo_actual)+Number(tx.monto);
      }
      await db.from('credit_cards').update({saldo_actual:newSaldo}).eq('id',tx.metodo_pago);
    }
  }
  await db.from('transactions').delete().eq('id',id);
  await loadAll(); render();
}

function filterByCat(catId) {
  state.gatosFiltCat = catId;
  const txList = catId
    ? state.transactions.filter(t=>t.fecha?.startsWith(curMonth())&&t.categoria===catId)
    : state.transactions.filter(t=>t.fecha?.startsWith(curMonth()));
  // Re-render just the list part
  const listEl = document.querySelector('.tx-list');
  if(!listEl) return;
  const cardOpts = ''; // not needed for re-render
  const rows = txList.slice(0,60).map(t=>{
    const cat  = state.budgetCategories.find(c=>c.id===t.categoria);
    const card = t.metodo_pago==='efectivo'?null:state.creditCards.find(c=>c.id===t.metodo_pago);
    const catIcon = cat?cat.icono:'📦';
    const metodoBadge = t.metodo_pago==='efectivo'
      ? '<span class="badge badge-neutral">💵 Efectivo</span>'
      : card?`<span class="badge badge-neutral">${card.tipo_tarjeta==='debito'?'🏧':'💳'} ${card.nombre_display||card.banco}</span>`:'';
    return `<div class="tx-item">
      <div class="tx-icon ${t.tipo}">${catIcon}</div>
      <div class="tx-body">
        <div class="tx-desc">${t.descripcion||cat?.nombre||'—'}</div>
        <div class="tx-meta">${fdate(t.fecha)} ${metodoBadge}</div>
      </div>
      <div>
        <div class="tx-amount ${t.tipo}">${t.tipo==='gasto'?'-':'+'} ${money(t.monto)}</div>
        <div style="text-align:right;margin-top:4px"><button class="btn-icon" onclick="deleteTx('${t.id}')">🗑</button></div>
      </div>
    </div>`;
  }).join('');
  listEl.innerHTML = rows || '<div class="empty-state"><div class="empty-icon">📭</div><p>Sin movimientos</p></div>';
}

async function payLoan(id) {

  if(!loan) return;
  await db.from('loan_payments').insert({loan_id:id,monto:loan.cuota_mensual,fecha:today()});
  await db.from('loans').update({monto_adeudado:Math.max(0,Number(loan.monto_adeudado)-Number(loan.cuota_mensual))}).eq('id',id);
  await loadAll(); render();
}

async function payLoanExtra(id) {

async function updateBudgetRange(catId,field,value) {
  const v=Number(value)||0;
  if(field==='min') state.budgetCategories=state.budgetCategories.map(c=>c.id===catId?{...c,presupuesto_min:v,presupuesto:v}:c);
  else state.budgetCategories=state.budgetCategories.map(c=>c.id===catId?{...c,presupuesto_max:v}:c);
  // Inline DOM update
  const cat=state.budgetCategories.find(c=>c.id===catId);
  const cm=curMonth();
  const mtx=state.transactions.filter(t=>t.fecha?.startsWith(cm)&&t.tipo==='gasto');
  const spent=mtx.filter(t=>t.categoria===catId).reduce((s,t)=>s+Number(t.monto),0);
  const bMax=Number(cat.presupuesto_max)||Number(cat.presupuesto)||0;
  const bMin=Number(cat.presupuesto_min)||0;
  const ref=bMax||bMin;
  const rem=ref-spent;
  const p=ref>0?pct(spent,ref):0;
  const st=p>100?'danger':p>85?'warning':'success';
  const row=document.querySelector(`[data-cat="${catId}"]`);
  if(row){
    const remEl=row.querySelector('.td-rem');
    const barEl=row.querySelector('.td-bar');
    if(remEl) remEl.textContent=`= ${money(rem)}`;
    if(barEl){barEl.style.width=clamp(p,0,100)+'%';barEl.style.background=`var(--${st})`;}
  }
  clearTimeout(_budgetTimer);
  _budgetTimer=setTimeout(async()=>{
    const updates=field==='min'?{presupuesto_min:v,presupuesto:v}:{presupuesto_max:v};
    await db.from('budget_categories').update(updates).eq('id',catId);
  },600);
}

async function updatePeriodicMonto(catId,value) {
  const v=Number(value)||0;
  state.budgetCategories=state.budgetCategories.map(c=>c.id===catId?{...c,monto_total:v}:c);
  clearTimeout(_budgetTimer);
  _budgetTimer=setTimeout(async()=>{
    await db.from('budget_categories').update({monto_total:v}).eq('id',catId);
  },600);
}

async function saveNewCard() {
  const banco=$('#ncBanco').value.trim();
  if(!banco) return alert('Ingresa el nombre del banco');
  const tipo=$('#ncTipo').value;
  const isCredit=tipo==='credito';
  const color=$('#ncColor').value||'#2d5a27';
  const saldo=Number($('#ncSaldo').value)||0;
  const id=banco.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now().toString(36);
  const displayName=(isCredit?'TC ':'TD ')+banco;
  let fechaVenc=null;
  if(!isCredit){const mes=$('#ncVencMes')?.value;const anio=$('#ncVencAnio')?.value;if(mes&&anio)fechaVenc=`${anio}-${mes}-01`;}
  const data={
    id,banco,tipo_tarjeta:tipo,nombre_display:displayName,saldo_actual:saldo,color,
    monto_aprobado:isCredit?(Number($('#ncLimite').value)||0):0,
    monto_sobregiro:isCredit?(Number($('#ncSobregiro').value)||0):0,
    fecha_corte:isCredit?(Number($('#ncCorte').value)||1):1,
    dias_limite_pago:isCredit?(Number($('#ncDiasPago').value)||25):0,
    fecha_vencimiento:fechaVenc,

  const colorPicker=colors.map(c=>`<div onclick="document.getElementById('ecColor').value='${c}';document.getElementById('ecColorPrev').style.background='${c}'" style="width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c===curColor?'white':'var(--border)'}"></div>`).join('');
  document.body.insertAdjacentHTML('beforeend',`
  <div class="modal-overlay" id="editCardModal" onclick="if(event.target===this)this.remove()">
    <div class="modal-box">
      <div class="modal-title">Editar ${cc.nombre_display||cc.banco}</div>

      <div class="form-group"><label class="form-label">Nombre a Mostrar</label><input class="form-input" id="ecDisplay" value="${cc.nombre_display||''}"></div>
      <div class="form-group"><label class="form-label">Tipo</label><select class="form-select" id="ecTipo"><option value="credito" ${isCredit?'selected':''}>💳 Crédito</option><option value="debito" ${!isCredit?'selected':''}>🏧 Débito</option></select></div>

      <div class="grid-2" style="gap:10px">
        <div class="form-group"><label class="form-label">Saldo Actual</label><input class="form-input" type="number" id="ecSaldo" value="${cc.saldo_actual}"></div>
        ${isCredit?`
        <div class="form-group"><label class="form-label">Límite</label><input class="form-input" type="number" id="ecLimite" value="${cc.monto_aprobado}"></div>
        <div class="form-group"><label class="form-label">Sobregiro</label><input class="form-input" type="number" id="ecSobregiro" value="${cc.monto_sobregiro}"></div>
        <div class="form-group"><label class="form-label">Día Corte</label><input class="form-input" type="number" id="ecCorte" value="${cc.fecha_corte}" min="1" max="31"></div>
        <div class="form-group"><label class="form-label">Días Límite Pago</label><input class="form-input" type="number" id="ecDiasPago" value="${cc.dias_limite_pago}"></div>
        `:`
        <div class="form-group"><label class="form-label">Vencimiento</label><div class="flex gap-2"><select class="form-select" id="ecVencMes" style="width:80px">${[...Array(12)].map((_,i)=>{const m=String(i+1).padStart(2,'0');const sel=cc.fecha_vencimiento&&cc.fecha_vencimiento.substring(5,7)===m?'selected':'';return `<option value="${m}" ${sel}>${m}</option>`;}).join('')}</select><input class="form-input" type="number" id="ecVencAnio" value="${cc.fecha_vencimiento?cc.fecha_vencimiento.substring(0,4):''}" placeholder="2028" style="width:90px"></div></div>
        `}
      </div>
      <div class="flex gap-2 mt-3" style="justify-content:flex-end">
        <button class="btn btn-ghost" onclick="$('#editCardModal').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveEditCard('${cc.id}',${isCredit})">💾 Guardar</button>
      </div>
    </div>
  </div>`);
}

async function saveEditCard(id,isCredit) {
  const data={
    banco:$('#ecBanco').value.trim(),
    nombre_display:$('#ecDisplay').value.trim(),
    tipo_tarjeta:$('#ecTipo').value,
    saldo_actual:Number($('#ecSaldo').value)||0,
    color:$('#ecColor').value||'#2d5a27',
  };
  if(isCredit){
    data.monto_aprobado=Number($('#ecLimite').value)||0;
    data.monto_sobregiro=Number($('#ecSobregiro').value)||0;
    data.fecha_corte=Number($('#ecCorte').value)||1;
    data.dias_limite_pago=Number($('#ecDiasPago').value)||25;
  } else {
    const mes=$('#ecVencMes')?.value;
    const anio=$('#ecVencAnio')?.value;
    data.fecha_vencimiento=(mes&&anio)?`${anio}-${mes}-01`:null;
  }
  await db.from('credit_cards').update(data).eq('id',id);
  $('#editCardModal').remove();
  await loadAll(); render();
}

// ============================================================
// EVENT BINDING
// ============================================================
function bindEvents() {
  // Bottom nav
  $$('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>{
      const nav = el.dataset.nav;
      if(nav !== state.section) state.subTab = '';
      state.section = nav;
      closeMenu();
      render();
    });
  });
  // Logo nav
  const logo=$('.topbar-logo');
  if(logo) logo.addEventListener('click',()=>{state.section='inicio';render();});
  // Theme toggle
  const themeBtn=$('#themeToggle');
  if(themeBtn) themeBtn.addEventListener('click',toggleTheme);
  // Hamburger
  const menuToggle=$('#menuToggle');
  if(menuToggle) menuToggle.addEventListener('click',openMenu);
  const menuClose=$('#menuClose');
  if(menuClose) menuClose.addEventListener('click',closeMenu);
  const menuOverlay=$('#menuOverlay');
  if(menuOverlay) menuOverlay.addEventListener('click',closeMenu);
}

function openMenu()  { $('#slideMenu')?.classList.add('open'); $('#menuOverlay')?.classList.add('open'); }
function closeMenu() { $('#slideMenu')?.classList.remove('open'); $('#menuOverlay')?.classList.remove('open'); }

// ============================================================
// AUTH / LOGIN
// ============================================================
function renderLogin(error='') {
  const app=$('#app');
  app.className='';
  app.innerHTML=`
  <div class="login-wrap">
    <div class="login-box">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:44px;margin-bottom:8px">💰</div>
        <h1 style="font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--accent)">FinanzasRD</h1>
        <p style="font-size:13px;color:var(--text-muted);margin-top:4px">Ingresa para continuar</p>
      </div>
      ${error?`<div class="alert alert-danger" style="margin-bottom:14px">❌ ${error}</div>`:''}
      <div class="form-group"><label class="form-label">Usuario</label><input class="form-input" id="loginUser" placeholder="aifotos o rosaliathen" autocomplete="username" style="font-size:15px"></div>
      <div class="form-group"><label class="form-label">Contraseña</label><input class="form-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" style="font-size:15px"></div>
      <button class="btn btn-primary btn-full mt-3" onclick="doLogin()" style="padding:12px;font-size:15px">Entrar</button>
    </div>
  </div>`;
  setTimeout(()=>{
    const u=$('#loginUser'), p=$('#loginPass');
    if(u) u.addEventListener('keydown',e=>{if(e.key==='Enter')p?.focus();});
    if(p) p.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    if(u) u.focus();
  },100);
}

async function doLogin() {
  const user=$('#loginUser').value.trim().toLowerCase();
  const pass=$('#loginPass').value;
  if(!user||!pass) return renderLogin('Ingresa usuario y contraseña');
  const email=user+'@finanzasrd.app';
  const {data,error}=await db.auth.signInWithPassword({email,password:pass});
  if(error) return renderLogin('Usuario o contraseña incorrectos');
  state.user=data.user;
  await loadAll();
  render();
}

async function doLogout() {
  await db.auth.signOut();
  state.user=null;
  renderLogin();
}

// ============================================================
// INIT
// ============================================================
async function init() {
  try {
    const {data:{session}} = await db.auth.getSession();
    if(session&&session.user) {
      state.user=session.user;
      await loadAll();
      render();
    } else {
      renderLogin();
    }
  } catch(e) {
    console.error(e);
    renderLogin('Error conectando con el servidor');
  }
}

init();

</script>
